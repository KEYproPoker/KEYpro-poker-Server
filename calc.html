<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チップ精算 - KEYpro poker</title>
<style>
  body, input, button, table, th, td, h2, div { font-family: 'KEYpro', sans-serif; }
  body { background-color: #1e3d2f; color: #ffffff; padding: 20px; text-align: center; margin: 0; }
  .container { max-width: 800px; margin: 0 auto; background-color: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  h2 { color: #f1c40f; margin-bottom: 20px; }
  
  .table-wrapper { width: 100%; margin-bottom: 15px; }
  
  table { margin: 0 auto; border-collapse: collapse; width: 100%; min-width: 550px; background-color: #ffffff; color: #000; border-radius: 5px; overflow: hidden; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background-color: #2c3e50; color: #ffffff; white-space: nowrap; }
  input { width: 100%; padding: 5px; box-sizing: border-box; text-align: right; font-size: 16px; border: 1px solid #bdc3c7; border-radius: 4px; }
  input[type="text"].name-input { text-align: left; }
  .readonly { background-color: #e9ecef; border: none; font-weight: bold; outline: none; }
  .summary { margin-top: 20px; font-size: 20px; font-weight: bold; color: #ecf0f1; }
  .match { color: #2ecc71; }
  .error { color: #e74c3c; }
  
  .btn { background-color: #f39c12; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; margin-top: 10px; font-weight: bold; }
  .btn:hover { background-color: #e67e22; }
  
  .save-btn { background-color: #e74c3c; font-size: 18px; padding: 15px 30px; margin-top: 30px; width: 80%; display: block; margin-left: auto; margin-right: auto; }
  .save-btn:hover { background-color: #c0392b; }
  .save-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }
  
  .back-btn { background-color: #7f8c8d; margin-top: 30px; }
  .back-btn:hover { background-color: #95a5a6; }
  .draft-notice { font-size: 12px; color: #bdc3c7; margin-top: 10px; }

  /* 📱 スマホ画面（幅600px以下）の時の「カード型」デザイン */
  @media screen and (max-width: 600px) {
    body { padding: 10px; }
    .container { padding: 15px 10px; }
    
    /* 表の枠をなくす */
    table { display: block; min-width: 100%; border: none; background-color: transparent; }
    /* 「プレイヤー名」「エントリー」などの一番上の見出しを消す */
    thead { display: none; }
    tbody { display: block; width: 100%; }
    
    /* 1人分の行を「カード」のように独立させる */
    tr { display: block; background-color: #ffffff; margin-bottom: 15px; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    
    /* セル（入力欄）を横並びに配置し、ラベルをつける */
    td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 8px 0; border-bottom: 1px dashed #ccc; }
    td:last-child { border-bottom: none; }
    
    /* JavaScriptで設定した「data-label」を文字として表示する */
    td::before { content: attr(data-label); font-weight: bold; color: #2c3e50; font-size: 14px; }
    
    /* 入力欄の幅とデザイン調整 */
    input { width: 55%; font-size: 16px; padding: 8px; }
    input[type="text"].name-input { text-align: right; } /* スマホでは名前も右寄せにして統一感を出す */
    .save-btn { width: 100%; font-size: 16px; padding: 12px 10px; }
  }
</style>
</head>
<body>

  <div class="container">
    <h2>💰 チップ精算</h2>

    <div class="table-wrapper">
      <table id="calcTable">
        <thead>
          <tr>
            <th>プレイヤー名</th>
            <th>エントリー</th>
            <th>最終持ち点</th>
            <th>精算後 (点)</th>
            <th>Pay (円)</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>

    <button class="btn" onclick="addRow()">+ プレイヤーを追加</button>

    <div class="summary" id="checkResult">
      合計Pay: <span id="totalPay">0</span> 円 <br>
      (状態: <span id="statusMessage" class="match">OK</span>)
    </div>
    
    <div class="draft-notice">※入力内容はブラウザに自動保存されています</div>

    <button class="btn save-btn" id="saveBtn" onclick="saveData()">💾 最終結果をスプレッドシートに記録</button>

    <button class="btn back-btn" onclick="location.href='index.html'">◀ トップページに戻る</button>
  </div>

<script>
  const STARTING_CHIPS = 20000;
  const RATE = 10;
  const INITIAL_ROWS = 5;

  function createRow() {
    const tr = document.createElement('tr');
    // スマホ表示用に data-label を追加しています
    tr.innerHTML = `
      <td data-label="👤 プレイヤー名"><input type="text" class="name-input" placeholder="名前" oninput="calculate()"></td>
      <td data-label="🎟️ エントリー"><input type="number" class="entry" value="1" min="0" oninput="calculate()"></td>
      <td data-label="🪙 最終持ち点"><input type="number" class="final-chips" value="0" step="100" oninput="calculate()"></td>
      <td data-label="📊 精算後 (点)"><input type="text" class="result readonly" value="-20000" readonly tabindex="-1"></td>
      <td data-label="💴 Pay (円)"><input type="text" class="pay readonly" value="-2000" readonly tabindex="-1"></td>
    `;
    return tr;
  }

  function addRow() {
    document.getElementById('tableBody').appendChild(createRow());
    calculate();
  }

  function calculate() {
    const rows = document.querySelectorAll('#tableBody tr');
    let totalPaySum = 0;
    let draftData = []; 

    rows.forEach(row => {
      const name = row.querySelector('.name-input').value;
      const entry = parseFloat(row.querySelector('.entry').value) || 0;
      const finalChips = parseFloat(row.querySelector('.final-chips').value) || 0;
      
      const result = finalChips - (entry * STARTING_CHIPS);
      const pay = result / RATE;

      row.querySelector('.result').value = result;
      row.querySelector('.pay').value = pay;

      totalPaySum += pay;

      draftData.push({ name, entry, finalChips });
    });

    document.getElementById('totalPay').innerText = totalPaySum;
    const msg = document.getElementById('statusMessage');
    
    if (totalPaySum === 0) {
      msg.innerText = "ピッタリ合っています！";
      msg.className = "match";
    } else {
      msg.innerText = `エラー: ${totalPaySum > 0 ? '+' : ''}${totalPaySum} 円ズレています`;
      msg.className = "error";
    }

    localStorage.setItem('pokerDraft', JSON.stringify(draftData));
  }
