<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポーカー管理 - KEYpro poker</title>
<style>
  /* 画面のハミ出しを完全に防ぐ */
  *, *::before, *::after { box-sizing: border-box; }

  body, button, h1, p, div { font-family: 'KEYpro', sans-serif; }
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; }
  
  /* 16:9のPCモニターを意識した大枠レイアウト */
  .dashboard-container { display: flex; flex-direction: row; width: 100%; max-width: 1200px; height: 80vh; min-height: 600px; background-color: rgba(0, 0, 0, 0.6); border-radius: 16px; border: 2px solid #d4af37; box-shadow: 0 10px 40px rgba(0,0,0,0.8); overflow: hidden; }
  
  /* 左カラム（情報＆タイマー） */
  .left-col { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px dashed #7f8c8d; background: rgba(0,0,0,0.2); }
  
  /* 右カラム（Liveランキング） */
  .right-col { flex: 1.5; padding: 40px; display: flex; flex-direction: column; overflow: hidden; }

  /* 左側のデザイン要素 */
  .suits { font-size: 28px; letter-spacing: 12px; margin-bottom: 10px; }
  .suit-red { color: #e74c3c; }
  .suit-black { color: #ffffff; }
  
  h1 { color: #d4af37; font-size: 42px; margin: 0 0 10px 0; text-shadow: 2px 2px 6px rgba(0,0,0,0.8); letter-spacing: 3px; }
  p.subtitle { font-size: 16px; margin-bottom: 40px; color: #ecf0f1; letter-spacing: 2px; }
  
  .date-header { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 10px 30px; border-radius: 50px; border: 1px solid #7f8c8d; }
  
  .timer-label { font-size: 18px; color: #bdc3c7; margin-bottom: 10px; letter-spacing: 2px; }
  .timer-display { background: #000; color: #2ecc71; font-family: 'Courier New', monospace; font-size: 72px; font-weight: bold; padding: 15px 30px; border-radius: 12px; border: 3px solid #333; margin-bottom: 40px; text-shadow: 0 0 20px rgba(46,204,113,0.6); box-shadow: inset 0 0 20px rgba(0,0,0,1); }
  
  .menu-btn.ranking { display: block; width: 90%; max-width: 350px; padding: 20px; background: linear-gradient(145deg, #2c3e50, #1a252f); color: #ffffff; font-size: 20px; font-weight: bold; text-decoration: none; border: 1px solid #7f8c8d; border-radius: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  .menu-btn.ranking:hover { background: linear-gradient(145deg, #34495e, #2c3e50); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.7); }
  
  /* 右側のデザイン要素（Liveランキング） */
  .board-title { color: #f1c40f; font-size: 22px; margin-bottom: 25px; letter-spacing: 2px; font-weight: bold; text-align: left; border-bottom: 2px solid #7f8c8d; padding-bottom: 10px; }
  
  .live-ranking-list { display: flex; flex-direction: column; gap: 12px; width: 100%; height: 100%; overflow-y: auto; padding-right: 10px; }
  .live-ranking-list::-webkit-scrollbar { width: 8px; }
  .live-ranking-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
  .live-ranking-list::-webkit-scrollbar-thumb { background: #7f8c8d; border-radius: 4px; }

  .live-rank-card { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(145deg, #1a252f, #2c3e50); border: 1px solid #7f8c8d; padding: 18px 25px; border-radius: 10px; font-size: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); flex-shrink: 0; }
  
  .live-rank-card.rank-1 { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); background: linear-gradient(145deg, #2c2810, #1a180a); }
  .live-rank-card.rank-2 { border-color: #bdc3c7; }
  .live-rank-card.rank-3 { border-color: #cd7f32; }

  .rank-col { font-weight: bold; width: 80px; text-align: left; font-size: 22px; }
  .rank-1 .rank-col { color: #f1c40f; }
  .rank-2 .rank-col { color: #bdc3c7; }
  .rank-3 .rank-col { color: #cd7f32; }

  .name-col { flex-grow: 1; text-align: left; font-weight: bold; color: #fff; padding-left: 15px; line-height: 1.4; font-size: 20px; }
  .entry-sub { font-size: 14px; color: #bdc3c7; font-weight: normal; margin-left: 8px; white-space: nowrap; }

  .pay-col { font-weight: bold; font-size: 26px; width: 100px; text-align: right; }
  .pay-col.plus { color: #2ecc71; text-shadow: 1px 1px 2px #000; }
  .pay-col.minus { color: #e74c3c; text-shadow: 1px 1px 2px #000; }
  .pay-col.zero { color: #ecf0f1; }

  .empty-text { color: #95a5a6; font-size: 18px; width: 100%; text-align: center; margin-top: 50px; }
  
  .footer-text { position: absolute; bottom: 15px; right: 20px; font-size: 12px; color: #7f8c8d; }

  .secret-btn { position: fixed; bottom: 15px; left: 15px; background: transparent; color: #7f8c8d; border: none; font-size: 14px; cursor: pointer; padding: 10px; transition: color 0.3s; text-align: left; outline: none; z-index: 100; }
  .secret-btn:hover { color: #d4af37; }

  /* 📱 スマホ用の滑らかスクロール＆センター調整設定 */
  @media screen and (max-width: 900px) {
    /* flexによる中央揃えを解除し、自然な縦スクロールに */
    body { padding: 10px; display: block; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    
    .dashboard-container { flex-direction: column; height: auto; min-height: auto; border-radius: 12px; border-width: 1px; }
    .left-col { border-right: none; border-bottom: 1px dashed #7f8c8d; padding: 30px 15px; }
    .right-col { padding: 30px 15px; overflow: visible; }
    
    /* ★ センターずれの修正：文字間隔(letter-spacing)の分だけ右側に負のマージンを入れて左に引っ張る */
    .suits { font-size: 32px; margin-right: -12px; } /* 12pxの文字間隔を相殺 */
