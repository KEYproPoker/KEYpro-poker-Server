<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ポーカー管理 - KEYpro poker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nosifer&family=Work+Sans:wght@900&display=swap" rel="stylesheet">
<style>
  /* 全体の設定 */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { max-width: 100vw; overflow-x: hidden; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; font-family: 'KEYpro', sans-serif; }
  
  .dashboard-container { display: flex; flex-direction: column; width: 98vw; max-width: 2000px; height: 96vh; min-height: 600px; background-color: rgba(10, 0, 0, 0.85); border-radius: 12px; border: 2px solid #d4af37; box-shadow: 0 15px 50px rgba(0,0,0,0.9); overflow: hidden; position: relative; }
  
  .dashboard-main { display: flex; flex-direction: row; flex: 1; min-height: 0; overflow: hidden; }

  .left-col { flex: 1; padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(127, 140, 141, 0.3); background: rgba(0,0,0,0.4); position: relative; }
  .right-col { flex: 1.5; padding: 20px 30px; display: flex; flex-direction: column; overflow: hidden; background: rgba(15, 0, 0, 0.6); gap: 15px; }

  .suits { font-size: clamp(32px, 4vw, 60px); letter-spacing: 12px; margin-bottom: 5px; opacity: 0.9; margin-right: -12px; }
  .suit-red { color: #ff4757; }
  .suit-black { color: #ffffff; }
  
  h1 { font-family: 'Work Sans', sans-serif; color: #d4af37; font-size: clamp(60px, 8vw, 120px); margin: 0 -4px 10px 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); letter-spacing: -3px; font-weight: 900; line-height: 1; }
  h1 span { font-family: 'KEYpro', sans-serif; color: #d4af37; font-size: clamp(16px, 2vw, 30px); margin-left: 10px; font-weight: normal; text-transform: uppercase; letter-spacing: 4px; vertical-align: middle; }

  p.subtitle { font-size: clamp(16px, 2vw, 28px); margin-bottom: 25px; margin-right: -3px; color: #7f8fa6; letter-spacing: 3px; text-transform: uppercase; }
  
  .date-header { font-size: clamp(24px, 3vw, 42px); font-weight: bold; color: #dcdde1; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 15px 30px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); letter-spacing: 3px; }
  
  .timer-label { font-size: clamp(20px, 2.5vw, 36px); color: #7f8fa6; margin-bottom: 10px; letter-spacing: 4px; text-transform: uppercase; }
  .timer-display { background: #000; color: #2ed573; font-family: 'Courier New', monospace; font-size: clamp(70px, 10vw, 150px); font-weight: bold; padding: 15px 20px; border-radius: 12px; border: 1px solid #2f3542; text-shadow: 0 0 30px rgba(46, 213, 115, 0.6); box-shadow: inset 0 0 40px rgba(0,0,0,1); letter-spacing: 2px; line-height: 1; margin-bottom: 20px; }
  
  .board-title { color: #d4af37; font-size: clamp(20px, 2vw, 34px); letter-spacing: 2px; font-weight: bold; text-align: left; border-bottom: 2px solid rgba(212, 175, 55, 0.4); padding-bottom: 12px; text-transform: uppercase; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .board-title::before { content: ''; display: inline-block; width: 8px; height: 32px; background-color: #d4af37; box-shadow: 0 0 12px #d4af37; }
  
  .live-ranking-list { display: flex; flex-direction: column; width: 100%; flex-grow: 1; min-height: 0; overflow: hidden; margin-bottom: 10px; position: relative; }
  
  .title-re-entry { font-family: 'Nosifer', sans-serif; color: #ff4757; -webkit-text-stroke: 1.5px #800000; border-bottom-color: rgba(179, 0, 0, 0.5); animation: flameTitle 4s ease-in-out infinite alternate; }
  .title-re-entry::before { background-color: #ff4757; box-shadow: 0 0 15px #ff4757; }
  .title-re-entry .title-skull { width: clamp(24px, 2.5vw, 36px); height: clamp(24px, 2.5vw, 36px); fill: #ff4757; margin-left: 10px; filter: drop-shadow(0 0 8px #ff0000); flex-shrink: 0; }

  .live-rank-card { display: flex; justify-content: flex-start; align-items: center; background: rgba(0, 0, 0, 0.9); border-left: 5px solid transparent; padding: clamp(12px, 1.5vw, 20px) clamp(15px, 2vw, 30px); border-radius: 0 10px 10px 0; box-shadow: inset 0 -1px 0 rgba(255,255,255,0.05); flex-shrink: 0; transition: all 0.3s; position: relative; overflow: hidden; border: 1px solid #1a1a1a; animation: crackFlicker 5s ease-in-out infinite; }
  .live-rank-card .card-skull-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: clamp(120px, 15vw, 200px); height: clamp(120px, 15vw, 200px); fill: rgba(255, 255, 255, 0.04); z-index: 0; pointer-events: none; }

  .live-rank-card.worst-1 { border-left-color: transparent; border-left-image: linear-gradient(180deg, #ff4500, #ff0000, #ff4500); border-left-image-slice: 1; background: linear-gradient(90deg, rgba(128, 0, 0, 0.3) 0%, rgba(0,0,0,0.9) 100%); border-color: rgba(179, 0, 0, 0.4); animation: flameCard 4s ease-in-out infinite alternate; }
  .worst-1 .card-skull-bg { fill: rgba(179, 0, 0, 0.08); filter: drop-shadow(0 0 15px #ff4500); }
  .live-rank-card.worst-2 { border-left-color: #bf9b30; background: linear-gradient(90deg, rgba(191, 155, 48, 0.08) 0%, rgba(0,0,0,0.7) 100%); border-color: rgba(191, 155, 48, 0.2); }
  .live-rank-card.worst-3 { border-left-color: #a67c00; background: linear-gradient(90deg, rgba(166, 124, 0, 0.05) 0%, rgba(0,0,0,0.7) 100%); border-color: rgba(166, 124, 0, 0.1); }

  .rank-col { width: clamp(80px, 9vw, 130px); display: flex; align-items: center; justify-content: flex-start; z-index: 1; flex-shrink: 0; }
  .name-col { flex-grow: 1; text-align: left; padding-left: 15px; display: flex; flex-direction: column; gap: 6px; justify-content: center; z-index: 1; overflow: hidden; }
  .entry-col { width: clamp(110px, 13vw, 180px); display: flex; align-items: center; justify-content: flex-end; z-index: 1; flex-shrink: 0; text-align: right; }
  
  .rank-badge-text { font-family: 'Nosifer', sans-serif; font-size: clamp(34px, 3.5vw, 50px); font-weight: normal; color: transparent; -webkit-text-stroke: 1.5px #800000; letter-spacing: 2px; line-height: 1; animation: flameRank 4s ease-in-out infinite alternate; }
  .worst-1 .rank-badge-text { font-size: clamp(40px, 4.5vw, 65px); -webkit-text-stroke-color: #800000; filter: drop-shadow(0 0 12px #ff4500); }
  .worst-2 .rank-badge-text { -webkit-text-stroke-color: #bf9b30; filter: drop-shadow(0 0 8px rgba(191, 155, 48, 0.5)); animation: none; }
  .worst-3 .rank-badge-text { -webkit-text-stroke-color: #a67c00; filter: drop-shadow(0 0 6px rgba(166, 124, 0, 0.4)); animation: none; }

  .player-name-item { font-size: clamp(24px, 3vw, 46px); font-weight: bold; color: #f1f2f6; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .worst-1 .player-name-item { font-size: clamp(30px, 3.8vw, 56px); color: #ffffff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 15px #ff4500; animation: flameName 3s ease-in-out infinite alternate; }

  .entry-badge { display: flex; align-items: baseline; justify-content: flex-end; gap: 8px; width: 100%; }
  .entry-badge .num { font-family: 'Nosifer', sans-serif; font-size: clamp(38px, 4.5vw, 65px); font-weight: normal; line-height: 1; color: #7f8fa6; }
  .entry-badge .unit { font-size: clamp(16px, 2vw, 28px); color: #7f8fa6; font-weight: normal; letter-spacing: 2px; }

  .worst-1 .entry-badge .num { color: #ff4500; text-shadow: 0 0 20px rgba(255, 69, 0, 0.6); animation: flameEntry 4s ease-in-out infinite alternate; }
  .worst-2 .entry-badge .num { color: #bf9b30; text-shadow: 0 0 12px rgba(191, 155, 48, 0.5); }
  .worst-3 .entry-badge .num { color: #a67c00; text-shadow: 0 0 10px rgba(166, 124, 0, 0.4); }

  @keyframes flameTitle { 0% { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 10px #ff4500; } 100% { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 15px #ff4500; } }
  @keyframes flameCard { 0% { box-shadow: 0 0 20px rgba(179, 0, 0, 0.5), inset 0 0 10px rgba(179, 0, 0, 0.2); } 100% { box-shadow: 0 0 25px rgba(179, 0, 0, 0.7), inset 0 0 15px rgba(179, 0, 0, 0.3); } }
  @keyframes flameRank { 0% { filter: drop-shadow(0 0 10px rgba(179, 0, 0, 0.6)); } 100% { filter: drop-shadow(0 0 15px rgba(179, 0, 0, 0.9)); } }
  @keyframes flameEntry { 0% { text-shadow: 0 0 15px rgba(255, 69, 0, 0.5); } 100% { text-shadow: 0 0 20px rgba(255, 69, 0, 0.8); } }
  @keyframes flameName { 0% { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 8px #ff4500; color: #ffffff; } 100% { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 12px #ff4500; color: #fff5e6; } }
  @keyframes crackFlicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.95; } }

  .title-active { color: #d4af37; border-bottom-color: rgba(212, 175, 55, 0.4); text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); margin-top: auto; }
  .title-active::before { background-color: #d4af37; box-shadow: 0 0 10px #d4af37; }

  .active-players-grid { display: flex; width: 100%; max-height: 250px; overflow: hidden; flex-shrink: 0; align-items: flex-start; justify-content: center; }

  /* =====================================================================
     ★ ゴージャス感のあるラグジュアリーなデザインに刷新（サイズ等は変更なし）
     ===================================================================== */
  .player-tag { 
    background: linear-gradient(145deg, rgba(30, 30, 30, 0.95) 0%, rgba(5, 5, 5, 0.95) 100%);
    border: 1px solid rgba(212, 175, 55, 0.4);
    border-left: 6px solid #d4af37;
    padding: 15px 25px; 
    border-radius: 8px; 
    font-size: clamp(20px, 2.5vw, 36px); 
    color: #fcf6ba; /* ほんのりゴールドがかったホワイト */
    display: flex; 
    flex-direction: column;
    align-items: flex-start; 
    gap: 0; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 2px 5px rgba(212, 175, 55, 0.15); 
    font-weight: bold; 
    letter-spacing: 2px; 
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
    position: relative; 
    cursor: pointer;
    min-width: clamp(220px, 22vw, 320px);
    overflow: hidden;
  }
  
  .player-tag::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(252, 246, 186, 0.2), transparent);
    transform: skewX(-20deg);
    transition: all 0.6s ease;
  }
  
  .player-tag:hover { 
    transform: translateY(-3px); 
    border-color: rgba(212, 175, 55, 0.8);
    box-shadow: 0 12px 30px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.4); 
  }
  .player-tag:hover::after {
    left: 200%;
  }

  .tag-header { display: flex; align-items: center; justify-content: space-between; width: 100%; position: relative; z-index: 2; }

  /* VIPタグのゴージャス化 */
  .vip-tag-1 { 
    border-left: 6px solid #f1c40f !important;
    background: linear-gradient(145deg, rgba(50, 40, 10, 0.95) 0%, rgba(10, 8, 5, 0.95) 100%) !important;
    border-color: rgba(241, 196, 15, 0.6) !important;
    box-shadow: 0 8px 20px rgba(0,0,0,0.8), 0 0 15px rgba(241, 196, 15, 0.2), inset 0 2px 5px rgba(241, 196, 15, 0.2) !important;
  }
  .vip-tag-1:hover { border-color: rgba(241, 196, 15, 1) !important; box-shadow: 0 12px 30px rgba(0,0,0,0.9), 0 0 25px rgba(241, 196, 15, 0.5) !important; }
  .vip-tag-1 .tag-name { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }

  .vip-tag-2 { 
    border-left: 6px solid #bdc3c7 !important;
    background: linear-gradient(145deg, rgba(40, 45, 50, 0.95) 0%, rgba(10, 12, 15, 0.95) 100%) !important;
    border-color: rgba(189, 195, 199, 0.6) !important;
    box-shadow: 0 8px 20px rgba(0,0,0,0.8), 0 0 15px rgba(189, 195, 199, 0.2), inset 0 2px 5px rgba(189, 195, 199, 0.2) !important;
  }
  .vip-tag-2:hover { border-color: rgba(189, 195, 199, 1) !important; box-shadow: 0 12px 30px rgba(0,0,0,0.9), 0 0 25px rgba(189, 195, 199, 0.5) !important; }
  .vip-tag-2 .tag-name { color: #bdc3c7; text-shadow: 0 0 10px rgba(189, 195, 199, 0.5); }

  .vip-tag-3 { 
    border-left: 6px solid #cd7f32 !important;
    background: linear-gradient(145deg, rgba(50, 30, 20, 0.95) 0%, rgba(15, 10, 5, 0.95) 100%) !important;
    border-color: rgba(205, 127, 50, 0.6) !important;
    box-shadow: 0 8px 20px rgba(0,0,0,0.8), 0 0 15px rgba(205, 127, 50, 0.2), inset 0 2px 5px rgba(205, 127, 50, 0.2) !important;
  }
  .vip-tag-3:hover { border-color: rgba(205, 127, 50, 1) !important; box-shadow: 0 12px 30px rgba(0,0,0,0.9), 0 0 25px rgba(205, 127, 50, 0.5) !important; }
  .vip-tag-3 .tag-name { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }

  /* タップで展開される戦績エリア */
  .player-stats {
    display: none;
    width: 100%;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(212, 175, 55, 0.2);
    font-family: 'Courier New', monospace;
    font-size: clamp(13px, 1.4vw, 18px);
    text-align: left;
    letter-spacing: 1px;
    font-weight: normal;
    position: relative;
    z-index: 2;
  }
  .player-tag.open .player-stats { display: block; animation: expandStats 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
  @keyframes expandStats { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px 15px;
  }
  .stat-item { display: flex; flex-direction: column; }
  .stat-label { color: #b39a59; font-size: 0.8em; letter-spacing: 2px; margin-bottom: 2px; }
  .stat-val { color: #ffffff; font-weight: bold; font-size: 1.1em; }
  .stat-val.plus { color: #2ed573; text-shadow: 0 0 8px rgba(46, 213, 115, 0.4); }
  .stat-val.minus { color: #ff4757; text-shadow: 0 0 8px rgba(255, 71, 87, 0.4); }
  
  .crown-icon { width: clamp(20px, 2.5vw, 32px); height: clamp(20px, 2.5vw, 32px); margin-left: 8px; margin-top: -2px; z-index: 1; }

  .empty-text { color: #57606f; font-size: clamp(18px, 2vw, 26px); width: 100%; text-align: center; margin-top: 20px; letter-spacing: 2px; line-height: 1.8; font-weight: bold; }
  .empty-text span { color: #d4af37; font-weight: bold; font-size: clamp(16px, 1.8vw, 22px); }
  
  .nav-buttons {
    position: absolute;
    bottom: 25px; 
    right: 25px; 
    display: none; 
    gap: 15px;
    z-index: 50;
  }
  
  .discreet-btn {
    background: rgba(0, 0, 0, 0.6);
    color: #7f8fa6;
    border: 1px solid rgba(127, 140, 141, 0.5);
    padding: 10px 20px; 
    font-size: clamp(12px, 1vw, 16px);
    border-radius: 50px;
    text-decoration: none;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    font-weight: bold;
    text-align: center; 
    white-space: nowrap;
  }
  .discreet-btn:hover { background: #d4af37; color: #000; border-color: #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); transform: translateY(-2px); }

  .secret-btn { position: fixed; top: 15px; left: 15px; background: transparent; color: #57606f; border: none; font-size: 32px; cursor: pointer; padding: 10px; transition: color 0.3s; outline: none; z-index: 100; }
  .secret-btn:hover { color: #ffffff; }

  .footer-text { position: absolute; bottom: 15px; left: 20px; font-size: 14px; color: #57606f; letter-spacing: 2px; text-transform: uppercase; z-index: 10;}

  /* 📱 スマホ用 */
  @media screen and (max-width: 900px) {
    body { padding: 10px; display: block; overflow-x: hidden; }
    .dashboard-container { flex-direction: column; height: auto; min-height: auto; border-radius: 8px; border-width: 1px; width: 100%; max-width: 100%; }
    .dashboard-main { flex-direction: column; }
    .left-col { border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 15px; }
    .right-col { padding: 25px 15px; gap: 20px; }
    
    .suits { font-size: 32px; }
    h1 { font-size: 36px; } 
    .timer-display { font-size: 56px; padding: 10px 20px; margin-bottom: 10px; }
    .board-title { font-size: 18px; text-align: center; justify-content: center; margin-right: -4px; }
    .board-title::before { display: none; }
    .title-re-entry { letter-spacing: 1px; font-size: 16px; }
    .title-re-entry .title-skull { display: none; }
    
    .live-ranking-list { height: auto; padding-right: 0; overflow: hidden; }
    .live-rank-card { padding: 10px 15px; border-radius: 0 4px 4px 0; border-left-width: 3px; }
    .live-rank-card .card-skull-bg { width: 90px; height: 90px; }
    .rank-col { width: 55px; flex-shrink: 0; }
    .rank-badge-text { font-size: 26px; }
    .worst-1 .rank-badge-text { font-size: 30px; letter-spacing: 2px; }
    .name-col { padding-left: 10px; gap: 2px; overflow: hidden; }
    .player-name-item { font-size: 15px; }
    .worst-1 .player-name-item { font-size: 16px; }
    .entry-col { width: 85px; flex-shrink: 0; }
    .entry-badge .num { font-size: 24px; }
    .entry-badge .unit { font-size: 10px; }
    .title-active { margin-top: 10px; }
    .active-players-grid { justify-content: center; max-height: none; overflow: hidden; }
    
    .nav-buttons { display: flex; position: static; justify-content: center; margin-top: 15px; margin-bottom: 10px; gap: 10px; width: 100%; }
    .discreet-btn { padding: 10px 15px; font-size: 11px; }
    .secret-btn { position: static; display: block; margin: 10px auto 0; font-size: 28px; padding: 5px; text-align: center; width: 100%; }
    .footer-text { position: static; text-align: center; margin-top: 10px; padding-bottom: 20px; display: block; width: 100%; }
    
    .new-challenger-title { font-size: 40px; text-shadow: 2px 2px 0 #000, -1px -1px 0 #fff, 0 0 10px #ff4757; }
    .new-challenger-name { font-size: 50px; -webkit-text-stroke: 2px #000; text-shadow: 3px 3px 0 #d4af37, 6px 6px 0 #000, 0 0 20px rgba(212,175,55,0.8); letter-spacing: 4px; }
  }

  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
  .modal-content { background: #121212; padding: 40px; border-radius: 8px; border: 1px solid #333; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0,0,0,1); }
  .modal-content h3 { color: #ffffff; margin-top: 0; font-size: 20px; margin-bottom: 10px; letter-spacing: 3px; text-transform: uppercase; }
  .modal-content p { font-size: 14px; color: #7f8fa6; margin-bottom: 25px; letter-spacing: 1px; }
  #adminPass { width: 160px; padding: 15px; font-size: 42px; text-align: center; letter-spacing: 12px; border-radius: 4px; border: 1px solid #555; background: #000; color: #d4af37; margin-bottom: 30px; outline: none; transition: all 0.3s; font-family: 'Courier New', monospace; padding-left: 24px; }
  #adminPass:focus { border-color: #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
  .modal-close-btn { background: transparent; color: #7f8fa6; border: 1px solid #555; padding: 12px 35px; border-radius: 50px; cursor: pointer; font-size: 14px; transition: all 0.3s; letter-spacing: 2px; text-transform: uppercase; }
  .modal-close-btn:hover { background: #ffffff; color: #000; border-color: #ffffff; }

  /* ★ 修正: バグ改善のため pointer-events: none; を追加 */
  .new-challenger-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: flashBg 1s ease-out forwards; overflow: hidden; pointer-events: none; }
  @keyframes flashBg { 0% { background: rgba(0, 0, 0, 0); } 100% { background: rgba(0, 0, 0, 0.95); } }
</style>
</head>
<body>
  
  <div class="dashboard-container">
    <div class="dashboard-main">
      <div class="left-col">
        <div class="suits">
          <span class="suit-black">♠</span><span class="suit-red">♥</span><span class="suit-black">♣</span><span class="suit-red">♦</span>
        </div>
        <h1>KEYpro<span>poker</span></h1>
        <p class="subtitle">Official Dashboard</p>
        
        <div class="date-header" id="todayDate">----/--/--</div>
        
        <div class="timer-label">SESSION TIME</div>
        <div class="timer-display" id="mainTimer">00:00</div>
      </div>

      <div class="right-col">
        <div class="board-title title-re-entry">
          RE-ENTRY RANKING
          <svg class="title-skull" viewBox="0 0 448 512"><path d="M439.2 236.1l-20.1-11.9c-6.4-3.8-14.6-1.6-18.4 5.1-18.9 34.6-56.3 58.7-99.1 58.7-42.8 0-80.1-24.1-99.1-58.7-3.8-6.7-12-8.9-18.4-5.1l-20.1 11.9c-6.7 4-8.9 12.6-5 19.3C181.8 290.4 200.7 320 224 320s42.2-29.6 66.8-64.7c3.9-6.7 1.7-15.3-5-19.3zm-111.2-120c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zm64 0c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zM224 0C100.3 0 0 100.3 0 224v192c0 53 43 96 96 96h256c53 0 96-43 96-96V224C448 100.3 347.7 0 224 0zm96 416c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm-128 0c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm160-224C352 110.3 294.5 48 224 48s-128 62.3-128 144v14.1c0 23.6 15.1 44.8 36.9 52.8l10.8 4c16.3 6 30.1 16.6 39.4 30.2 11.2-16.1 27.6-29 46.9-36l10.8-4c21.8-8 36.9-29.2 36.9-52.8V192zm-32 96c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32zm-128 0c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32z"/></svg>
        </div>
        <div id="topLiveBoard" class="live-ranking-list">
          <div class="empty-text">現在リエントリー中のプレイヤーはいません<br><span>🕊 ALL PLAYERS SURVIVING</span></div>
        </div>

        <div class="board-title title-active">ACTIVE PLAYERS</div>
        <div id="activePlayersBoard" class="active-players-grid">
          <div class="empty-text">現在プレイ中の参加者はいません</div>
        </div>
      </div>
    </div>
    
    <div class="nav-buttons">
      <a href="ranking.html" class="discreet-btn">HALL OF FAME</a>
      <a href="rules.html" class="discreet-btn">HOW TO PLAY</a>
    </div>
  </div>

  <button class="secret-btn" onclick="showPasswordModal()">⚙</button>
  <div class="footer-text">© 2026 KEYpro poker Server</div>

  <div id="passModal" class="modal-overlay">
    <div class="modal-content">
      <h3>HOST AUTHENTICATION</h3>
      <p>ENTER 4-DIGIT PIN</p>
      <input type="password" id="adminPass" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <br>
      <button class="modal-close-btn" onclick="closeModal()">CANCEL</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWO4bFy5lAHALlnKr32b9TTTXNcNQuIqU",
      authDomain: "keypro-poker-server.firebaseapp.com",
      projectId: "keypro-poker-server",
      storageBucket: "keypro-poker-server.firebasestorage.app",
      messagingSenderId: "953048452758",
      appId: "1:953048452758:web:16aa168ae600cc97e67cb7",
      measurementId: "G-3HVG0EP54D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxijPOgmKGDL-UL5eAqOBKrxKVfPl4v6hsdLcWbiuwMrCWSPI5fqxu3qOmXIFTrMYCi5A/exec";

    let displayedNames = [];
    let pendingNames = [];
    let isFirstLoad = true;
    let latestData = []; 
    let top3Players = {};
    
    let globalHofData = [];

    function formatNumber(num) {
      return Number(num).toLocaleString();
    }

    fetch(GAS_URL, { redirect: 'follow' })
      .then(res => res.json())
      .then(players => {
        if (players && players.length > 0) {
          globalHofData = players; 
          if(players[0]) top3Players[players[0].name] = 1;
          if(players[1]) top3Players[players[1].name] = 2;
          if(players[2]) top3Players[players[2].name] = 3;
          if(latestData.length > 0) renderBoard(latestData);
        }
      })
      .catch(e => console.error("HOF Load Error", e));

    function triggerNewChallenger(playerName) {
      const container = document.createElement('div');
      container.className = 'new-challenger-overlay';
      const title = document.createElement('div');
      title.className = 'new-challenger-title';
      title.innerText = 'NEW CHALLENGER!';
      const nameDiv = document.createElement('div');
      nameDiv.className = 'new-challenger-name';
      nameDiv.innerText = playerName + '\nJOINED!';
      
      container.appendChild(title);
      container.appendChild(nameDiv);
      document.body.appendChild(container);

      const effectPatterns = [
        { type: 'chip', anim: 'fall' }, { type: 'card', anim: 'fall' }, { type: 'gold', anim: 'fall' }, 
        { type: 'laser', anim: 'fall' }, { type: 'confetti', anim: 'fall' }, { type: 'firework', anim: 'rise' }, 
        { type: 'slot', anim: 'fall' }, { type: 'hand', anim: 'zoom' }, { type: 'ring', anim: 'explode' }, { type: 'star', anim: 'explode' }
      ];
      const effect = effectPatterns[Math.floor(Math.random() * effectPatterns.length)];
      const count = window.innerWidth < 600 ? 30 : 70; 
      const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6', '#ffffff'];
      const suits = ['♠', '♥', '♣', '♦'];
      const slots = ['7', 'BAR', '🍒', '🔔', '💎'];
      const ranks = ['A', 'K', 'Q', 'J', '10'];

      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        let dur = Math.random() * 3 + 3; 
        let delay = Math.random() * 0.5;
        p.style.left = (Math.random() * 100) + 'vw';
        p.style.setProperty('--tx', (Math.random() * 100) + 'vw');
        p.style.setProperty('--ty', (Math.random() * 100) + 'vh');
        p.style.setProperty('--s', Math.random() * 2 + 1);

        if (effect.type === 'chip') {
          p.style.width = '50px'; p.style.height = '50px'; p.style.borderRadius = '50%';
          p.style.border = '4px dashed rgba(255,255,255,0.7)'; p.style.background = colors[Math.floor(Math.random() * colors.length)];
          p.innerText = suits[Math.floor(Math.random() * suits.length)]; p.style.color = '#fff'; p.style.fontSize = '20px'; p.style.boxShadow = '0 5px 10px rgba(0,0,0,0.5)';
        } else if (effect.type === 'card') {
          p.style.width = '40px'; p.style.height = '60px'; p.style.background = '#fff'; p.style.borderRadius = '4px';
          let suit = suits[Math.floor(Math.random() * suits.length)]; p.innerText = suit; p.style.color = (suit === '♥' || suit === '♦') ? '#e74c3c' : '#2c3e50';
          p.style.fontSize = '24px'; p.style.border = '1px solid #ccc';
        } else if (effect.type === 'gold') {
          if (Math.random() > 0.5) { p.style.width = '40px'; p.style.height = '40px'; p.style.borderRadius = '50%'; p.style.background = 'radial-gradient(circle, #f1c40f, #d35400)'; p.innerText = '¥'; p.style.color = '#fff'; p.style.fontSize = '20px';
          } else { p.style.width = '50px'; p.style.height = '25px'; p.style.background = '#27ae60'; p.style.borderRadius = '2px'; p.innerText = '$'; p.style.color = '#fff'; }
        } else if (effect.type === 'confetti') { p.style.width = '15px'; p.style.height = '15px'; p.style.background = colors[Math.floor(Math.random() * colors.length)]; dur = Math.random() * 4 + 3; 
        } else if (effect.type === 'slot') { p.innerText = slots[Math.floor(Math.random() * slots.length)]; p.style.fontSize = '45px';
        } else if (effect.type === 'star') { p.innerText = '★'; p.style.color = colors[Math.floor(Math.random() * colors.length)]; p.style.fontSize = (Math.random() * 30 + 20) + 'px'; p.style.textShadow = '0 0 10px #fff';
        } else if (effect.type === 'firework') { p.style.width = '10px'; p.style.height = '10px'; p.style.borderRadius = '50%'; p.style.background = colors[Math.floor(Math.random() * colors.length)]; p.style.boxShadow = '0 0 20px ' + p.style.background; p.style.setProperty('--tx', ((Math.random() - 0.5) * 50) + 'vw');
        } else if (effect.type === 'laser') { p.style.width = '4px'; p.style.height = '150px'; p.style.background = colors[Math.floor(Math.random() * colors.length)]; p.style.boxShadow = '0 0 20px ' + p.style.background; dur = Math.random() * 1 + 0.5; 
        } else if (effect.type === 'ring') { p.style.width = '50px'; p.style.height = '50px'; p.style.borderRadius = '50%'; p.style.border = '5px solid ' + colors[Math.floor(Math.random() * colors.length)]; p.style.boxShadow = '0 0 15px ' + p.style.borderColor; p.style.setProperty('--s', Math.random() * 4 + 2);
        } else if (effect.type === 'hand') { let suit = suits[Math.floor(Math.random() * suits.length)]; let rank = ranks[Math.floor(Math.random() * ranks.length)]; p.innerText = rank + suit; p.style.fontSize = '30px'; p.style.color = (suit === '♥' || suit === '♦') ? '#e74c3c' : '#2c3e50'; p.style.background = '#fff'; p.style.padding = '5px 10px'; p.style.borderRadius = '5px'; p.style.border = '2px solid #d4af37'; p.style.left = '50vw'; p.style.top = '50vh'; p.style.setProperty('--s', Math.random() * 3 + 1.5); }
        p.style.animation = `${effect.anim} ${dur}s linear ${delay}s forwards`;
        container.appendChild(p);
      }
      setTimeout(() => { container.style.opacity = '0'; container.style.transition = 'opacity 1s ease'; setTimeout(() => container.remove(), 1000); }, 5000);
    }

    function applyAutoScale() {
      const rankContainer = document.getElementById('topLiveBoard');
      if (rankContainer) {
        const wrapper = rankContainer.querySelector('.scale-wrapper');
        if (wrapper) {
          wrapper.style.transform = 'scale(1)';
          wrapper.style.width = '100%';
          const availableHeight = rankContainer.clientHeight;
          const contentHeight = wrapper.scrollHeight;
          if (contentHeight > availableHeight && availableHeight > 0) {
            const scale = (availableHeight / contentHeight) * 0.98; 
            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.width = `${100 / scale}%`; 
          }
        }
      }

      const activeContainer = document.getElementById('activePlayersBoard');
      if (activeContainer) {
        const wrapper = activeContainer.querySelector('.scale-wrapper');
        if (wrapper) {
          wrapper.style.transform = 'scale(1)';
          wrapper.style.width = '100%';
          const availableHeight = activeContainer.clientHeight;
          const contentHeight = wrapper.scrollHeight;
          if (contentHeight > availableHeight && availableHeight > 0) {
            const scale = (availableHeight / contentHeight) * 0.98;
            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.width = `${100 / scale}%`; 
          }
        }
      }
    }

    window.addEventListener('resize', applyAutoScale);

    function renderBoard(data) {
      const playersBoard = document.getElementById('activePlayersBoard');
      const rankingBoard = document.getElementById('topLiveBoard');
      
      let activePlayers = [];
      let reEntryPlayers = [];

      data.forEach(player => {
        if (player.name && player.name.trim() !== "" && displayedNames.includes(player.name) && player.entry > 0) { 
          activePlayers.push({ name: player.name });
          if (player.entry > 1) {
            reEntryPlayers.push({ name: player.name, reEntry: player.entry - 1 });
          }
        }
      });

      let html = '';
      if (reEntryPlayers.length > 0) {
        let groups = {};
        reEntryPlayers.forEach(p => {
          let key = p.reEntry; 
          if (!groups[key]) { groups[key] = { reEntry: p.reEntry, names: [] }; }
          groups[key].names.push(p.name);
        });

        let groupArray = Object.values(groups);
        groupArray.sort((a, b) => b.reEntry - a.reEntry);

        groupArray.forEach((group, index) => {
          let rankStr = String(index + 1).padStart(2, '0');
          let rankClass = "worst-other";
          if (index === 0) { rankClass = "worst-1"; }
          else if (index === 1) { rankClass = "worst-2"; }
          else if (index === 2) { rankClass = "worst-3"; }

          let namesHtml = group.names.map(name => `<div class="player-name-item">${name}</div>`).join('');
          let entryText = `<span class="num">${group.reEntry}</span><span class="unit">RE</span>`;

          html += `
            <div class="live-rank-card ${rankClass}">
              <svg class="card-skull-bg" viewBox="0 0 448 512"><path d="M439.2 236.1l-20.1-11.9c-6.4-3.8-14.6-1.6-18.4 5.1-18.9 34.6-56.3 58.7-99.1 58.7-42.8 0-80.1-24.1-99.1-58.7-3.8-6.7-12-8.9-18.4-5.1l-20.1 11.9c-6.7 4-8.9 12.6-5 19.3C181.8 290.4 200.7 320 224 320s42.2-29.6 66.8-64.7c3.9-6.7 1.7-15.3-5-19.3zm-111.2-120c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zm64 0c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zM224 0C100.3 0 0 100.3 0 224v192c0 53 43 96 96 96h256c53 0 96-43 96-96V224C448 100.3 347.7 0 224 0zm96 416c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm-128 0c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm160-224C352 110.3 294.5 48 224 48s-128 62.3-128 144v14.1c0 23.6 15.1 44.8 36.9 52.8l10.8 4c16.3 6 30.1 16.6 39.4 30.2 11.2-16.1 27.6-29 46.9-36l10.8-4c21.8-8 36.9-29.2 36.9-52.8V192zm-32 96c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32zm-128 0c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32z"/></svg>
              <div class="rank-col"><div class="rank-badge-text">${rankStr}</div></div>
              <div class="name-col">${namesHtml}</div>
              <div class="entry-col"><div class="entry-badge">${entryText}</div></div>
            </div>
          `;
        });
      }
      
      let pureRankHtml = html || '<div class="empty-text">現在リエントリー中のプレイヤーはいません<br><span>🕊 ALL PLAYERS SURVIVING</span></div>';
      let wrappedRankHtml = `<div class="scale-wrapper" style="width: 100%; display: flex; flex-direction: column; gap: 12px; transform-origin: top left; transition: transform 0.3s ease;">${pureRankHtml}</div>`;
      
      if (rankingBoard.dataset.state !== pureRankHtml) {
        rankingBoard.innerHTML = wrappedRankHtml;
        rankingBoard.dataset.state = pureRankHtml;
      }

      let playersHtml = '';
      if (activePlayers.length > 0) {
        activePlayers.forEach(p => {
          let crownSvg = '';
          let tagClass = 'player-tag';
          if (top3Players[p.name] === 1) {
              crownSvg = `<svg class="crown-icon crown-gold" viewBox="0 0 512 512"><path d="M493.4 24.6l-104 192C385.6 224.2 376.5 229 366.1 226.7l-94.2-20.9L288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32l16.1 173.8-94.2 20.9c-10.3 2.3-19.4-2.5-23.2-10.1l-104-192C15.4 10.3 4.2 13 1 24.6c-3.2 11.6 2 24 13.5 28.5L128 100.9l-11.2 266c-.6 13.5 10 25.1 23.5 25.1h231.4c13.5 0 24.1-11.6 23.5-25.1l-11.2-266 113.5-47.8c11.5-4.5 16.7-16.9 13.5-28.5c-3.2-11.6-14.4-14.3-18.1-10.1zM80 448c0-17.7 14.3-32 32-32h288c17.7 0 32 14.3 32 32s-14.3 32-32 32H112c-17.7 0-32-14.3-32-32z"/></svg>`;
              tagClass += ' vip-tag-1';
          } else if (top3Players[p.name] === 2) {
              crownSvg = `<svg class="crown-icon crown-silver" viewBox="0 0 512 512"><path d="M493.4 24.6l-104 192C385.6 224.2 376.5 229 366.1 226.7l-94.2-20.9L288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32l16.1 173.8-94.2 20.9c-10.3 2.3-19.4-2.5-23.2-10.1l-104-192C15.4 10.3 4.2 13 1 24.6c-3.2 11.6 2 24 13.5 28.5L128 100.9l-11.2 266c-.6 13.5 10 25.1 23.5 25.1h231.4c13.5 0 24.1-11.6 23.5-25.1l-11.2-266 113.5-47.8c11.5-4.5 16.7-16.9 13.5-28.5c-3.2-11.6-14.4-14.3-18.1-10.1zM80 448c0-17.7 14.3-32 32-32h288c17.7 0 32 14.3 32 32s-14.3 32-32 32H112c-17.7 0-32-14.3-32-32z"/></svg>`;
              tagClass += ' vip-tag-2';
          } else if (top3Players[p.name] === 3) {
              crownSvg = `<svg class="crown-icon crown-bronze" viewBox="0 0 512 512"><path d="M493.4 24.6l-104 192C385.6 224.2 376.5 229 366.1 226.7l-94.2-20.9L288 32c0-17.7-14.3-32-32-32s-32 14.3-32 32l16.1 173.8-94.2 20.9c-10.3 2.3-19.4-2.5-23.2-10.1l-104-192C15.4 10.3 4.2 13 1 24.6c-3.2 11.6 2 24 13.5 28.5L128 100.9l-11.2 266c-.6 13.5 10 25.1 23.5 25.1h231.4c13.5 0 24.1-11.6 23.5-25.1l-11.2-266 113.5-47.8c11.5-4.5 16.7-16.9 13.5-28.5c-3.2-11.6-14.4-14.3-18.1-10.1zM80 448c0-17.7 14.3-32 32-32h288c17.7 0 32 14.3 32 32s-14.3 32-32 32H112c-17.7 0-32-14.3-32-32z"/></svg>`;
              tagClass += ' vip-tag-3';
          }

          let pData = globalHofData.find(h => h.name === p.name);
          let rank = "-";
          let games = 0;
          let pay = 0;

          if (pData) {
            rank = globalHofData.indexOf(pData) + 1;
            games = pData.games || 0;
            pay = pData.pay || 0;
          }

          let payStr = formatNumber(pay);
          let payClass = "stat-val";
          if(pay > 0) {
            payClass = "stat-val plus";
            payStr = "+" + payStr;
          } else if (pay < 0) {
            payClass = "stat-val minus";
          }

          playersHtml += `
            <div class="${tagClass}" onclick="this.classList.toggle('open'); setTimeout(applyAutoScale, 50);">
              <div class="tag-header">
                <span class="tag-name">${p.name}</span>
                ${crownSvg}
              </div>
              <div class="player-stats">
                <div class="stats-grid">
                  <div class="stat-item"><span class="stat-label">RANK</span><span class="stat-val">${rank}位</span></div>
                  <div class="stat-item"><span class="stat-label">GAMES</span><span class="stat-val">${games}</span></div>
                  <div class="stat-item"><span class="stat-label">PAY</span><span class="${payClass}">${payStr}</span></div>
                </div>
              </div>
            </div>
          `;
        });
      }

      let purePlayersHtml = playersHtml || '<div class="empty-text">現在プレイ中の参加者はいません</div>';
      let wrappedPlayersHtml = `<div class="scale-wrapper" style="width: 100%; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; transform-origin: top center; transition: transform 0.3s ease;">${purePlayersHtml}</div>`;
      
      if (playersBoard.dataset.state !== purePlayersHtml) {
        playersBoard.innerHTML = wrappedPlayersHtml;
        playersBoard.dataset.state = purePlayersHtml;
      }

      setTimeout(applyAutoScale, 50);
    }

    let currentTimerState = { running: false, elapsedSeconds: 0, lastUpdate: Date.now() };
    onValue(ref(db, 'pokerSession/timer'), (snapshot) => {
      const data = snapshot.val();
      if (data) currentTimerState = data;
    });

    setInterval(() => {
      let currentElapsed = currentTimerState.elapsedSeconds;
      if (currentTimerState.running) {
        const elapsedSinceUpdate = Math.floor((Date.now() - currentTimerState.lastUpdate) / 1000);
        currentElapsed += elapsedSinceUpdate;
      }
      const h = Math.floor(currentElapsed / 3600);
      const m = Math.floor((currentElapsed % 3600) / 60);
      const s = currentElapsed % 60;
      
      const newTimerText = (h > 0 ? String(h).padStart(2, '0') + ':' : '') + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      const timerDisplay = document.getElementById('mainTimer');
      if (timerDisplay.innerText !== newTimerText) timerDisplay.innerText = newTimerText;
    }, 1000);

    onValue(ref(db, 'pokerSession/players'), (snapshot) => {
      latestData = snapshot.val() || [];
      
      if (isFirstLoad) {
        latestData.forEach(p => {
          if (p.name && p.name.trim() !== "") {
            displayedNames.push(p.name);
          }
        });
        isFirstLoad = false;
        renderBoard(latestData);
        return;
      }

      latestData.forEach(p => {
        let name = p.name ? p.name.trim() : "";
        if (name !== "" && p.entry > 0) {
          if (!displayedNames.includes(name) && !pendingNames.includes(name)) {
            pendingNames.push(name);
            
            setTimeout(() => {
              pendingNames = pendingNames.filter(n => n !== name);
              const stillExists = latestData.some(player => player.name === name);
              if (stillExists) {
                if (!displayedNames.includes(name)) {
                  displayedNames.push(name);
                }
                triggerNewChallenger(name); 
                renderBoard(latestData);
              }
            }, 60000); 
          }
        }
      });

      renderBoard(latestData);
    });

    const now = new Date();
    document.getElementById('todayDate').innerText = now.getFullYear() + "/" + String(now.getMonth() + 1).padStart(2, '0') + "/" + String(now.getDate()).padStart(2, '0');

    window.showPasswordModal = function() {
      const modal = document.getElementById('passModal');
      const input = document.getElementById('adminPass');
      modal.style.display = 'flex';
      input.value = '';
      input.focus(); 
    };

    window.closeModal = function() {
      document.getElementById('passModal').style.display = 'none';
    };

    document.getElementById('adminPass').addEventListener('input', function(e) {
      if (this.value.length === 4) {
        if (this.value === "5424") {
          location.href = 'calc.html';
        } else {
          alert("INCORRECT PIN");
          this.value = '';
        }
      }
    });
  </script>
</body>
</html>
