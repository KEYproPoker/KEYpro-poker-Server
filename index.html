<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポーカー管理 - KEYpro poker</title>
<style>
  /* 全体の設定 */
  *, *::before, *::after { box-sizing: border-box; }

  body, button, h1, p, div { font-family: 'KEYpro', sans-serif; }
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; }
  
  .dashboard-container { display: flex; flex-direction: row; width: 100%; max-width: 1200px; height: 85vh; min-height: 650px; background-color: rgba(0, 0, 0, 0.8); border-radius: 16px; border: 2px solid #d4af37; box-shadow: 0 15px 50px rgba(0,0,0,0.9); overflow: hidden; }
  
  .left-col { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(127, 140, 141, 0.3); background: rgba(0,0,0,0.4); position: relative; }
  .right-col { flex: 1.5; padding: 40px; display: flex; flex-direction: column; overflow: hidden; background: rgba(10, 15, 20, 0.6); gap: 30px; }

  /* 左カラムのデザイン */
  .suits { font-size: 28px; letter-spacing: 12px; margin-bottom: 10px; opacity: 0.9; margin-right: -12px; }
  .suit-red { color: #ff4757; }
  .suit-black { color: #ffffff; }
  
  h1 { color: #d4af37; font-size: 42px; margin: 0 -4px 10px 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); letter-spacing: 4px; }
  p.subtitle { font-size: 14px; margin-bottom: 40px; margin-right: -3px; color: #7f8fa6; letter-spacing: 3px; text-transform: uppercase; }
  
  .date-header { font-size: 18px; font-weight: bold; color: #dcdde1; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 10px 30px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); letter-spacing: 2px; margin-right: -2px; }
  
  .timer-label { font-size: 16px; color: #7f8fa6; margin-bottom: 10px; letter-spacing: 3px; text-transform: uppercase; margin-right: -3px; }
  .timer-display { background: #000; color: #2ed573; font-family: 'Courier New', monospace; font-size: 76px; font-weight: bold; padding: 15px 30px; border-radius: 8px; border: 1px solid #2f3542; margin-bottom: 40px; text-shadow: 0 0 25px rgba(46, 213, 115, 0.5); box-shadow: inset 0 0 30px rgba(0,0,0,1); letter-spacing: 2px; margin-right: -2px; }
  
  /* ★ ボタン群のデザイン */
  .button-group { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 350px; }
  .menu-btn { display: block; width: 100%; padding: 18px; font-weight: bold; text-decoration: none; border-radius: 4px; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; text-transform: uppercase; }
  
  /* ランキングボタン */
  .menu-btn.ranking { background: rgba(255,255,255,0.03); color: #d4af37; font-size: 18px; border: 1px solid #d4af37; }
  .menu-btn.ranking:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

  /* ルールボタン */
  .menu-btn.rules { background: transparent; color: #7f8fa6; font-size: 14px; border: 1px solid #7f8fa6; }
  .menu-btn.rules:hover { background: rgba(255,255,255,0.1); color: #ffffff; border-color: #ffffff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
  
  /* 共通タイトルデザイン */
  .board-title { color: #ff4757; font-size: 20px; letter-spacing: 4px; font-weight: bold; text-align: left; border-bottom: 1px solid rgba(255, 71, 87, 0.4); padding-bottom: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px rgba(255, 71, 87, 0.4); margin-bottom: 15px; flex-shrink: 0; }
  .board-title::before { content: ''; display: inline-block; width: 6px; height: 20px; background-color: #ff4757; box-shadow: 0 0 10px #ff4757; }
  
  /* 🔴 リエントリーランキング */
  .live-ranking-list { display: flex; flex-direction: column; gap: 15px; width: 100%; flex-grow: 1; overflow-y: auto; padding-right: 15px; }
  .live-ranking-list::-webkit-scrollbar { width: 4px; }
  .live-ranking-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .live-ranking-list::-webkit-scrollbar-thumb { background: #57606f; }

  /* クール＆洗練されたカードデザイン */
  .live-rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.7); border: 1px solid #333; padding: 15px 25px; border-radius: 8px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); flex-shrink: 0; transition: all 0.3s; border-left: 5px solid #7f8fa6; position: relative; overflow: hidden; }
  .live-rank-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100%); opacity: 0.7; }
  
  .live-rank-card.worst-1 { border-left-color: #ff4757; background: linear-gradient(90deg, rgba(255, 71, 87, 0.2) 0%, rgba(0,0,0,0.7) 50%); border-color: rgba(255, 71, 87, 0.4); box-shadow: 0 0 25px rgba(255, 71, 87, 0.2); }
  .live-rank-card.worst-2 { border-left-color: #ffa502; background: linear-gradient(90deg, rgba(255, 165, 2, 0.15) 0%, rgba(0,0,0,0.7) 50%); border-color: rgba(255, 165, 2, 0.3); }
  .live-rank-card.worst-3 { border-left-color: #eccc68; background: linear-gradient(90deg, rgba(236, 204, 104, 0.1) 0%, rgba(0,0,0,0.7) 50%); border-color: rgba(236, 204, 104, 0.2); }

  .rank-col { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.8); box-shadow: inset 0 0 20px rgba(255,255,255,0.05); }
  .rank-badge-text { font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; color: #7f8fa6; letter-spacing: 2px; }
  
  .worst-1 .rank-col { border-color: rgba(255, 71, 87, 0.6); box-shadow: inset 0 0 25px rgba(255, 71, 87, 0.3); }
  .worst-1 .rank-badge-text { color: #ff4757; text-shadow: 0 0 15px rgba(255, 71, 87, 0.7); }
  
  .worst-2 .rank-col { border-color: rgba(255, 165, 2, 0.5); box-shadow: inset 0 0 20px rgba(255, 165, 2, 0.2); }
  .worst-2 .rank-badge-text { color: #ffa502; text-shadow: 0 0 10px rgba(255, 165, 2, 0.6); }

  .worst-3 .rank-col { border-color: rgba(236, 204, 104, 0.4); box-shadow: inset 0 0 15px rgba(236, 204, 104, 0.1); }
  .worst-3 .rank-badge-text { color: #eccc68; text-shadow: 0 0 10px rgba(236, 204, 104, 0.5); }

  /* 名前表示（不要な文字を消し、縦中央に） */
  .name-col { flex-grow: 1; text-align: left; padding-left: 20px; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
  .player-name-item { font-size: 20px; font-weight: bold; color: #f1f2f6; letter-spacing: 1px; line-height: 1.2; text-shadow: 1px 1px 2px #000; }

  /* リエントリー回数表示 */
  .entry-col { font-weight: bold; font-size: 42px; width: 180px; text-align: right; color: #ff4757; font-family: 'Courier New', monospace; letter-spacing: 2px; text-shadow: 0 0 25px rgba(255, 71, 87, 0.5); line-height: 1; }
  .entry-unit { font-size: 16px; color: #bdc3c7; font-weight: normal; margin-left: 8px; letter-spacing: 1px; font-family: 'KEYpro', sans-serif; position: relative; top: -6px; }

  .worst-2 .entry-col { color: #ffa502; text-shadow: 0 0 20px rgba(255, 165, 2, 0.4); }
  .worst-3 .entry-col { color: #eccc68; text-shadow: 0 0 15px rgba(236, 204, 104, 0.3); }
  .worst-other .entry-col { color: #bdc3c7; text-shadow: none; }

  /* 🟢 参加者リスト（ACTIVE PLAYERS） */
  .title-active { color: #2ed573; border-bottom-color: rgba(46, 213, 115, 0.4); text-shadow: 0 0 10px rgba(46, 213, 115, 0.4); margin-top: auto; }
  .title-active::before { background-color: #2ed573; box-shadow: 0 0 10px #2ed573; }

  .active-players-grid { display: flex; flex-wrap: wrap; gap: 12px; align-content: flex-start; max-height: 140px; overflow-y: auto; padding-right: 10px; flex-shrink: 0; }
  .active-players-grid::-webkit-scrollbar { width: 4px; }
  .active-players-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .active-players-grid::-webkit-scrollbar-thumb { background: #57606f; }

  .player-tag { background: rgba(0, 0, 0, 0.6); border: 1px solid #2f3542; padding: 8px 18px; border-radius: 50px; font-size: 16px; color: #f1f2f6; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); font-weight: bold; letter-spacing: 1px; }
  .player-tag .status-dot { width: 8px; height: 8px; background: #2ed573; border-radius: 50%; box-shadow: 0 0 8px #2ed573; animation: blink 2s infinite; }
  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  .empty-text { color: #57606f; font-size: 14px; width: 100%; text-align: center; margin-top: 30px; letter-spacing: 2px; line-height: 1.8; font-weight: bold; }
  .empty-text span { color: #2ed573; font-weight: bold; font-size: 13px; }
  
  .footer-text { position: absolute; bottom: 15px; right: 20px; font-size: 11px; color: #57606f; letter-spacing: 1px; text-transform: uppercase; }
  .secret-btn { position: fixed; bottom: 15px; left: 15px; background: transparent; color: #57606f; border: none; font-size: 14px; cursor: pointer; padding: 10px; transition: color 0.3s; outline: none; z-index: 100; }
  .secret-btn:hover { color: #d4af37; }

  /* パスワード入力用モーダル */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
  .modal-content { background: #121212; padding: 40px; border-radius: 8px; border: 1px solid #333; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 0 30px rgba(0,0,0,1); }
  .modal-content h3 { color: #d4af37; margin-top: 0; font-size: 18px; margin-bottom: 10px; letter-spacing: 3px; text-transform: uppercase; margin-right: -3px; }
  .modal-content p { font-size: 12px; color: #7f8fa6; margin-bottom: 25px; letter-spacing: 1px; margin-right: -1px; }
  #adminPass { width: 140px; padding: 12px; font-size: 36px; text-align: center; letter-spacing: 12px; border-radius: 4px; border: 1px solid #555; background: #000; color: #d4af37; margin-bottom: 30px; outline: none; transition: all 0.3s; font-family: 'Courier New', monospace; padding-left: 24px; }
  #adminPass:focus { border-color: #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
  .modal-close-btn { background: transparent; color: #7f8fa6; border: 1px solid #555; padding: 10px 30px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.3s; letter-spacing: 2px; text-transform: uppercase; margin-right: -2px; }
  .modal-close-btn:hover { background: #333; color: #fff; border-color: #7f8fa6; }

  /* 📱 スマホ用の設定 */
  @media screen and (max-width: 900px) {
    body { padding: 10px; display: block; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .dashboard-container { flex-direction: column; height: auto; min-height: auto; border-radius: 8px; border-width: 1px; }
    .left-col { border-right: none; border-bottom: 1px solid rgba(127, 140, 141, 0.3); padding: 30px 15px; }
    .right-col { padding: 25px 15px; overflow: visible; gap: 20px; }
    
    .suits { font-size: 32px; }
    h1 { font-size: 32px; }

    .timer-display { font-size: 52px; padding: 10px 20px; margin-bottom: 30px; }
    
    .button-group { width: 100%; }
    .menu-btn { padding: 15px; font-size: 16px; }
    .menu-btn.rules { font-size: 14px; }
    
    .board-title { font-size: 18px; text-align: center; justify-content: center; margin-right: -4px; }
    .board-title::before { display: none; }
    
    .live-ranking-list { height: auto; overflow-y: visible; padding-right: 0; }
    .live-rank-card { padding: 12px; border-radius: 4px; border-left-width: 4px; }
    .rank-col { width: 50px; height: 50px; border-width: 2px; }
    .rank-badge-text { font-size: 20px; }
    
    .name-col { padding-left: 10px; gap: 4px; }
    .player-name-item { font-size: 15px; }
    
    .entry-col { font-size: 28px; width: 100px; }
    .entry-unit { font-size: 12px; top: -4px; margin-left: 4px; }
    
    .title-active { margin-top: 10px; }
    .active-players-grid { justify-content: center; max-height: none; }
    
    .footer-text { position: static; text-align: center; margin-top: 20px; padding-bottom: 20px; }
  }
</style>
</head>
<body>
  
  <div class="dashboard-container">
    <div class="left-col">
      <div class="suits">
        <span class="suit-black">♠</span><span class="suit-red">♥</span><span class="suit-black">♣</span><span class="suit-red">♦</span>
      </div>
      <h1>KEYpro poker</h1>
      <p class="subtitle">Official Dashboard</p>
      
      <div class="date-header" id="todayDate">----/--/--</div>
      
      <div class="timer-label">SESSION TIME</div>
      <div class="timer-display" id="mainTimer">00:00</div>
      
      <div class="button-group">
        <button class="menu-btn ranking" onclick="location.href='ranking.html'">HALL OF FAME</button>
        <button class="menu-btn rules" onclick="location.href='rules.html'">HOW TO PLAY</button>
      </div>
    </div>

    <div class="right-col">
      <div class="board-title">RE-ENTRY RANKING</div>
      <div id="topLiveBoard" class="live-ranking-list">
        <div class="empty-text">現在リエントリー中のプレイヤーはいません<br><span>🕊 ALL PLAYERS SURVIVING</span></div>
      </div>

      <div class="board-title title-active">ACTIVE PLAYERS</div>
      <div id="activePlayersBoard" class="active-players-grid">
        <div class="empty-text" style="margin-top: 20px;">現在プレイ中の参加者はいません</div>
      </div>
    </div>
  </div>

  <div class="footer-text">© 2026 KEYpro poker Server</div>

  <button class="secret-btn" onclick="showPasswordModal()">⚙</button>

  <div id="passModal" class="modal-overlay">
    <div class="modal-content">
      <h3>HOST AUTHENTICATION</h3>
      <p>ENTER 4-DIGIT PIN</p>
      <input type="password" id="adminPass" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <br>
      <button class="modal-close-btn" onclick="closeModal()">CANCEL</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWO4bFy5lAHALlnKr32b9TTTXNcNQuIqU",
      authDomain: "keypro-poker-server.firebaseapp.com",
      projectId: "keypro-poker-server",
      storageBucket: "keypro-poker-server.firebasestorage.app",
      messagingSenderId: "953048452758",
      appId: "1:953048452758:web:16aa168ae600cc97e67cb7",
      measurementId: "G-3HVG0EP54D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentTimerState = { running: false, elapsedSeconds: 0, lastUpdate: Date.now() };

    onValue(ref(db, 'pokerSession/timer'), (snapshot) => {
      const data = snapshot.val();
      if (data) currentTimerState = data;
    });

    setInterval(() => {
      let currentElapsed = currentTimerState.elapsedSeconds;
      if (currentTimerState.running) {
        const elapsedSinceUpdate = Math.floor((Date.now() - currentTimerState.lastUpdate) / 1000);
        currentElapsed += elapsedSinceUpdate;
      }
      const h = Math.floor(currentElapsed / 3600);
      const m = Math.floor((currentElapsed % 3600) / 60);
      const s = currentElapsed % 60;
      document.getElementById('mainTimer').innerText = 
        (h > 0 ? String(h).padStart(2, '0') + ':' : '') + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }, 1000);

    onValue(ref(db, 'pokerSession/players'), (snapshot) => {
      const draftData = snapshot.val() || [];
      const playersBoard = document.getElementById('activePlayersBoard');
      const rankingBoard = document.getElementById('topLiveBoard');
      
      let activePlayers = [];
      let reEntryPlayers = [];
      
      draftData.forEach(player => {
        if (player.name && player.name.trim() !== "" && player.entry > 0) { 
          activePlayers.push({ name: player.name });
          if (player.entry > 1) {
            reEntryPlayers.push({ name: player.name, reEntry: player.entry - 1 });
          }
        }
      });

      // 🔴 リエントリーランキングの描画
      if (reEntryPlayers.length === 0) {
        rankingBoard.innerHTML = '<div class="empty-text">現在リエントリー中のプレイヤーはいません<br><span>🕊 ALL PLAYERS SURVIVING</span></div>';
      } else {
        let groups = {};
        reEntryPlayers.forEach(p => {
          let key = p.reEntry; 
          if (!groups[key]) {
            groups[key] = { reEntry: p.reEntry, names: [] };
          }
          groups[key].names.push(p.name);
        });

        let groupArray = Object.values(groups);
        groupArray.sort((a, b) => b.reEntry - a.reEntry);

        let html = '<div class="live-ranking-list">';
        groupArray.forEach((group, index) => {
          let rankStr = (index + 1);
          let rankClass = "rank-other";
          
          if (index === 0) { rankClass = "worst-1"; }
          else if (index === 1) { rankClass = "worst-2"; }
          else if (index === 2) { rankClass = "worst-3"; }

          // サブタイトルを消したので、シンプルに名前だけを入れる
          let namesHtml = group.names.map(name => `<div class="player-name-item">${name}</div>`).join('');
          let entryText = group.reEntry + `<span class="entry-unit">RE</span>`;

          html += `
            <div class="live-rank-card ${rankClass}">
              <div class="rank-col">
                <div class="rank-badge-text">${rankStr}</div>
              </div>
              <div class="name-col">
                ${namesHtml}
              </div>
              <div class="entry-col">${entryText}</div>
            </div>
          `;
        });
        html += '</div>';
        rankingBoard.innerHTML = html;
      }

      // 🟢 参加者リストの描画
      if (activePlayers.length === 0) {
        playersBoard.innerHTML = '<div class="empty-text" style="margin-top: 20px;">現在プレイ中の参加者はいません</div>';
      } else {
        let playersHtml = '';
        activePlayers.forEach(p => {
          playersHtml += `
            <div class="player-tag">
              <span class="status-dot"></span>
              <span class="tag-name">${p.name}</span>
            </div>
          `;
        });
        playersBoard.innerHTML = playersHtml;
      }
    });

    const now = new Date();
    document.getElementById('todayDate').innerText = now.getFullYear() + "/" + String(now.getMonth() + 1).padStart(2, '0') + "/" + String(now.getDate()).padStart(2, '0');

    window.showPasswordModal = function() {
      const modal = document.getElementById('passModal');
      const input = document.getElementById('adminPass');
      modal.style.display = 'flex';
      input.value = '';
      setTimeout(() => input.focus(), 100);
    };

    window.closeModal = function() {
      document.getElementById('passModal').style.display = 'none';
    };

    document.getElementById('adminPass').addEventListener('input', function(e) {
      if (this.value.length === 4) {
        if (this.value === "5424") {
          location.href = 'calc.html';
        } else {
          alert("INCORRECT PIN");
          this.value = '';
        }
      }
    });
  </script>
</body>
</html>
