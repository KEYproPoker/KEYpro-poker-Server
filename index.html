<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポーカー管理 - KEYpro poker</title>
<style>
  body, button, h1, p, div { font-family: 'KEYpro', sans-serif; }
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; text-align: center; padding: 30px 20px; margin: 0; min-height: 100vh; position: relative; }
  .container { max-width: 600px; margin: 0 auto; background-color: rgba(0, 0, 0, 0.5); padding: 40px 30px; border-radius: 12px; border: 2px solid #d4af37; box-shadow: 0 8px 32px rgba(0,0,0,0.6); position: relative; }
  
  .suits { font-size: 24px; letter-spacing: 10px; margin-bottom: 5px; }
  .suit-red { color: #e74c3c; }
  .suit-black { color: #ffffff; }
  
  h1 { color: #d4af37; font-size: 34px; margin: 0 0 5px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px; }
  p { font-size: 15px; margin-bottom: 30px; color: #ecf0f1; letter-spacing: 1px; }
  
  .live-dashboard { background: rgba(0, 0, 0, 0.6); border: 1px solid #d4af37; border-radius: 8px; padding: 20px 15px; margin-bottom: 30px; }
  .date-header { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 15px; border-bottom: 1px dashed #7f8c8d; padding-bottom: 10px; }
  
  .timer-label { font-size: 14px; color: #bdc3c7; margin-bottom: 5px; letter-spacing: 1px; }
  .timer-display { background: #000; color: #2ecc71; font-family: 'Courier New', monospace; font-size: 48px; font-weight: bold; padding: 10px 20px; border-radius: 8px; border: 2px solid #333; margin-bottom: 20px; text-shadow: 0 0 10px rgba(46,204,113,0.5); display: inline-block; }
  
  .board-title { color: #f1c40f; font-size: 14px; margin-bottom: 15px; letter-spacing: 1px; }
  
  /* リアルタイムランキングのデザイン */
  .live-ranking-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .live-rank-card { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(145deg, #1a252f, #2c3e50); border: 1px solid #7f8c8d; padding: 12px 15px; border-radius: 8px; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
  
  /* 順位ごとの装飾 */
  .live-rank-card.rank-1 { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.4); }
  .live-rank-card.rank-2 { border-color: #bdc3c7; }
  .live-rank-card.rank-3 { border-color: #cd7f32; }

  .rank-col { font-weight: bold; width: 60px; text-align: left; }
  .rank-1 .rank-col { color: #f1c40f; }
  .rank-2 .rank-col { color: #bdc3c7; }
  .rank-3 .rank-col { color: #cd7f32; }

  /* 複数人をまとめて表示できるよう折り返しを許可 */
  .name-col { flex-grow: 1; text-align: left; font-weight: bold; color: #fff; padding-left: 10px; line-height: 1.5; font-size: 15px; }
  .entry-sub { font-size: 12px; color: #bdc3c7; font-weight: normal; margin-left: 5px; white-space: nowrap; }

  .pay-col { font-weight: bold; font-size: 18px; width: 70px; text-align: right; }
  .pay-col.plus { color: #2ecc71; text-shadow: 1px 1px 2px #000; }
  .pay-col.minus { color: #e74c3c; text-shadow: 1px 1px 2px #000; }
  .pay-col.zero { color: #ecf0f1; }

  .empty-text { color: #95a5a6; font-size: 14px; width: 100%; text-align: center; }

  .menu-btn.ranking { display: block; width: 80%; margin: 0 auto; padding: 20px; background: linear-gradient(145deg, #2c3e50, #1a252f); color: #ffffff; font-size: 22px; font-weight: bold; text-decoration: none; border: 1px solid #7f8c8d; border-radius: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
  .menu-btn.ranking:hover { background: linear-gradient(145deg, #34495e, #2c3e50); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.6); }
  
  .footer-text { margin-top: 40px; font-size: 12px; color: #7f8c8d; }

  .secret-btn { position: fixed; bottom: 15px; left: 15px; background: transparent; color: #7f8c8d; border: none; font-size: 14px; cursor: pointer; padding: 10px; transition: color 0.3s; text-align: left; outline: none; z-index: 100; }
  .secret-btn:hover { color: #d4af37; }

  @media screen and (max-width: 600px) {
    body { padding: 15px 10px; }
    .container { padding: 30px 10px; }
    h1 { font-size: 28px; }
    .timer-display { font-size: 36px; }
    .live-rank-card { padding: 10px; font-size: 14px; }
    .pay-col { font-size: 16px; width: 60px; }
    .menu-btn.ranking { width: 95%; font-size: 18px; padding: 18px; }
    .secret-btn { bottom: 10px; left: 10px; font-size: 12px; padding: 5px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="suits">
      <span class="suit-black">♠</span><span class="suit-red">♥</span><span class="suit-black">♣</span><span class="suit-red">♦</span>
    </div>
    <h1>KEYpro poker</h1>
    <p>公式ダッシュボード</p>
    
    <div class="live-dashboard">
      <div class="date-header" id="todayDate">----年--月--日</div>
      
      <div class="timer-label">⏳ 本日のプレイ時間</div>
      <div class="timer-display" id="mainTimer">00:00</div>
      
      <div class="board-title">♠️ 現在のLiveランキング ♥️</div>
      <div id="topLiveBoard">
        <div class="empty-text">現在プレイ中のゲームはありません</div>
      </div>
    </div>

    <button class="menu-btn ranking" onclick="location.href='ranking.html'">👑 総合ランキングを見る</button>
    <div class="footer-text">© 2026 KEYpro poker Server</div>
  </div>

  <button class="secret-btn" onclick="checkPassword()">⚙️ 精算</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWO4bFy5lAHALlnKr32b9TTTXNcNQuIqU",
      authDomain: "keypro-poker-server.firebaseapp.com",
      projectId: "keypro-poker-server",
      storageBucket: "keypro-poker-server.firebasestorage.app",
      messagingSenderId: "953048452758",
      appId: "1:953048452758:web:16aa168ae600cc97e67cb7",
      measurementId: "G-3HVG0EP54D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function formatK(num) {
      if (num === 0) return "0";
      if (Math.abs(num) >= 1000) return (num / 1000).toString() + "K";
      return num.toString();
    }

    // タイマーの同期
    let currentTimerState = { running: false, elapsedSeconds: 0, lastUpdate: Date.now() };

    onValue(ref(db, 'pokerSession/timer'), (snapshot) => {
      const data = snapshot.val();
      if (data) currentTimerState = data;
    });

    setInterval(() => {
      let currentElapsed = currentTimerState.elapsedSeconds;
      if (currentTimerState.running) {
        const elapsedSinceUpdate = Math.floor((Date.now() - currentTimerState.lastUpdate) / 1000);
        currentElapsed += elapsedSinceUpdate;
      }

      const h = Math.floor(currentElapsed / 3600);
      const m = Math.floor((currentElapsed % 3600) / 60);
      const s = currentElapsed % 60;
      const formattedTime = (h > 0 ? String(h).padStart(2, '0') + ':' : '') + 
                            String(m).padStart(2, '0') + ':' + 
                            String(s).padStart(2, '0');
      document.getElementById('mainTimer').innerText = formattedTime;
    }, 1000);

    // 参加者情報の同期とランキングの「グループ化」
    const STARTING_CHIPS = 20000;
    const RATE = 10;

    onValue(ref(db, 'pokerSession/players'), (snapshot) => {
      const draftData = snapshot.val() || [];
      const board = document.getElementById('topLiveBoard');
      let activePlayers = [];
      
      draftData.forEach(player => {
        if (player.name && player.name.trim() !== "" && player.entry > 0) {
          const finalChips = player.finalChips || 0;
          const result = finalChips - (player.entry * STARTING_CHIPS);
          const pay = result / RATE;
          activePlayers.push({ name: player.name, entry: player.entry, pay: pay });
        }
      });

      if (activePlayers.length === 0) {
        board.innerHTML = '<div class="empty-text">現在プレイ中のゲームはありません</div>';
        return;
      }

      // ★ Payとエントリー数が同じ人をグループにまとめる
      let groups = {};
      activePlayers.forEach(p => {
        let key = p.pay + "_" + p.entry; // 同じ点数・同じエントリー数の人をまとめる
        if (!groups[key]) {
          groups[key] = { pay: p.pay, entry: p.entry, names: [] };
        }
        groups[key].names.push(p.name);
      });

      // 配列に変換して、Payが多い順（降順）に並べ替え
      let groupArray = Object.values(groups);
      groupArray.sort((a, b) => b.pay - a.pay);

      // HTMLを生成
      let html = '<div class="live-ranking-list">';
      groupArray.forEach((group, index) => {
        let rankStr = (index + 1) + "位";
        let rankClass = "rank-other";
        
        if (index === 0) { rankStr = "🥇 1位"; rankClass = "rank-1"; }
        else if (index === 1) { rankStr = "🥈 2位"; rankClass = "rank-2"; }
        else if (index === 2) { rankStr = "🥉 3位"; rankClass = "rank-3"; }

        let payClass = group.pay > 0 ? "plus" : (group.pay < 0 ? "minus" : "zero");
        let payText = group.pay > 0 ? "+" + formatK(group.pay) : formatK(group.pay);

        // 名前の配列を「、」でつなぐ（例：Aさん、Bさん、Cさん）
        let namesText = group.names.join('、');

        html += `
          <div class="live-rank-card ${rankClass}">
            <div class="rank-col">${rankStr}</div>
            <div class="name-col">${namesText} <span class="entry-sub">(${group.entry}E)</span></div>
            <div class="pay-col ${payClass}">${payText}</div>
          </div>
        `;
      });
      html += '</div>';
      
      board.innerHTML = html;
    });

    // 日付設定
    const now = new Date();
    document.getElementById('todayDate').innerText = now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日";

    window.checkPassword = function() {
      const pass = prompt("管理者パスワードを入力してください:");
      if (pass === "keypro5424") {
        location.href = 'calc.html';
      } else if (pass !== null) {
        alert("パスワードが違います。");
      }
    };
  </script>
</body>
</html>
