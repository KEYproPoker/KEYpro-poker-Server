<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HALL OF FAME - KEYpro poker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Work+Sans:wght@900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  /* ★修正: 背景色をダークグリーンで塗りつぶし、白余白を消す */
  html, body { max-width: 100vw; overflow-x: hidden; scroll-behavior: smooth; background-color: #0a2e1c; }
  /* ★修正: min-heightを100dvhにし、背景をfixedに */
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); background-attachment: fixed; color: #ffffff; text-align: center; margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: 'KEYpro', sans-serif; }
  
  .container { display: flex; flex-direction: column; width: 96vw; max-width: 1400px; height: 94vh; min-height: 600px; background-color: rgba(0, 0, 0, 0.8); border-radius: 16px; border: 2px solid #d4af37; box-shadow: 0 15px 50px rgba(0,0,0,0.9); overflow: hidden; padding: 40px; position: relative; }

  h1 { font-family: 'Work Sans', sans-serif; color: #d4af37; font-size: clamp(40px, 4vw, 64px); margin: 0 0 5px 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); letter-spacing: -3px; font-weight: 900; }
  h1 span { font-family: 'KEYpro', sans-serif; color: #d4af37; font-size: clamp(12px, 1vw, 16px); margin-left: 10px; font-weight: normal; text-transform: uppercase; letter-spacing: 4px; vertical-align: middle; }

  p.subtitle { font-size: clamp(12px, 1vw, 16px); margin-bottom: 20px; color: #7f8fa6; letter-spacing: 3px; text-transform: uppercase; }

  .board-title { color: #d4af37; font-size: clamp(18px, 1.5vw, 24px); letter-spacing: 4px; font-weight: bold; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.4); padding-bottom: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-shrink: 0; }
  .board-title::before { content: ''; display: inline-block; width: 6px; height: 20px; background-color: #d4af37; box-shadow: 0 0 10px #d4af37; }

  .ranking-list { display: flex; flex-direction: column; gap: 15px; width: 100%; flex-grow: 1; overflow-y: auto; padding-right: 15px; margin-bottom: 20px; }
  .ranking-list::-webkit-scrollbar { width: 4px; }
  .ranking-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .ranking-list::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }

  .rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.7); border: 1px solid #333; padding: 15px 25px; border-radius: 8px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); flex-shrink: 0; transition: all 0.3s; border-left: 5px solid #7f8fa6; position: relative; overflow: hidden; }
  .rank-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100%); opacity: 0.7; pointer-events: none; }
  
  .rank-col { display: flex; align-items: center; justify-content: center; width: 55px; margin-right: 15px; z-index: 1; flex-shrink: 0; }
  .rank-badge-text { font-family: 'Courier New', monospace; font-size: clamp(32px, 3vw, 42px); font-weight: bold; color: #7f8fa6; letter-spacing: 2px; }

  .name-col { flex-grow: 1; text-align: left; padding-left: 10px; display: flex; flex-direction: column; gap: 2px; justify-content: center; z-index: 1; overflow: hidden; }
  .player-name { font-size: clamp(16px, 1.8vw, 24px); font-weight: bold; color: #f1f2f6; letter-spacing: 2px; text-transform: uppercase; text-shadow: 1px 1px 2px #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .games-played { font-size: clamp(10px, 1vw, 14px); color: #7f8fa6; letter-spacing: 1px; font-family: 'Courier New', monospace; font-weight: bold; }
  .rank-1 .games-played { color: rgba(241, 196, 15, 0.8); }

  .score-col { font-weight: bold; font-size: clamp(24px, 3vw, 42px); text-align: right; font-family: 'Courier New', monospace; letter-spacing: 1px; line-height: 1; z-index: 1; flex-shrink: 0; }

  .score-plus { color: #2ed573; text-shadow: 0 0 15px rgba(46, 213, 115, 0.4); }
  .score-minus { color: #ff4757; text-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }

  .empty-text { color: #d4af37; font-size: 18px; width: 100%; text-align: center; margin-top: 40px; letter-spacing: 2px; line-height: 2; font-weight: bold; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }

  .discreet-next-btn { position: absolute; top: 25px; left: 30px; background: transparent; color: #7f8fa6; border: none; padding: 5px 10px; font-size: 12px; text-decoration: none; letter-spacing: 3px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); font-weight: bold; z-index: 100; display: flex; align-items: center; gap: 8px; opacity: 0.7; }
  .discreet-next-btn::before { content: ''; display: inline-block; width: 6px; height: 6px; border-top: 2px solid currentColor; border-left: 2px solid currentColor; transform: rotate(-45deg); margin-top: 1px; }
  .discreet-next-btn:hover { color: #d4af37; opacity: 1; transform: translateX(-5px); }

  /* 📱 スマホ用 */
  @media screen and (max-width: 900px) {
    /* ★修正: min-heightを100dvhにし、パディングを減らしてマージンを消す */
    body { padding: 10px; display: block; overflow-x: hidden; min-height: 100dvh; }
    .container { padding: 50px 15px 15px 15px; width: 100%; height: auto; min-height: auto; border-radius: 8px; border-width: 1px; display: block; position: relative; margin-bottom: 0; }
    
    h1 { font-size: 36px; letter-spacing: -2px; }
    h1 span { font-size: 12px; }
    .board-title { font-size: 18px; margin-right: -4px; }
    .ranking-list { padding-right: 0; gap: 12px; margin-bottom: 0; }
    .rank-card { padding: 12px 15px; border-left-width: 4px; border-radius: 6px; }
    .rank-col { width: 45px; margin-right: 10px; }
    .rank-badge-text { font-size: 28px; }
    .name-col { padding-left: 5px; }
    .player-name { font-size: 16px; }
    .games-played { font-size: 10px; }
    .score-col { font-size: 24px; }
    .discreet-next-btn { position: absolute; top: 15px; left: 15px; font-size: 10px; padding: 5px; margin: 0; }
  }

  @keyframes shimmer { 0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; } 30% { opacity: 0.6; } 50% { opacity: 0; } 100% { transform: translateX(150%) skewX(-20deg); opacity: 0; } }
  @keyframes pulsing-glow-1 { 0% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.15), inset 0 0 5px rgba(241, 196, 15, 0.05); } 50% { box-shadow: 0 0 25px rgba(241, 196, 15, 0.4), inset 0 0 10px rgba(241, 196, 15, 0.2); } 100% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.15), inset 0 0 5px rgba(241, 196, 15, 0.05); } }
  @keyframes pulsing-glow-2 { 0% { box-shadow: 0 0 10px rgba(189, 195, 199, 0.1); } 50% { box-shadow: 0 0 20px rgba(189, 195, 199, 0.3); } 100% { box-shadow: 0 0 10px rgba(189, 195, 199, 0.1); } }
  @keyframes pulsing-glow-3 { 0% { box-shadow: 0 0 8px rgba(205, 127, 50, 0.08); } 50% { box-shadow: 0 0 15px rgba(205, 127, 50, 0.2); } 100% { box-shadow: 0 0 8px rgba(205, 127, 50, 0.08); } }

  .rank-card.rank-1::before, .rank-card.rank-2::before, .rank-card.rank-3::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 20%, rgba(255, 255, 255, 0.3) 50%, rgba(255, 255, 255, 0.05) 80%, rgba(255, 255, 255, 0) 100%); z-index: 2; pointer-events: none; opacity: 0; }
  
  .rank-card.rank-1 { border-left-color: #f1c40f; background: linear-gradient(90deg, rgba(241, 196, 15, 0.15) 0%, rgba(0,0,0,0.7) 50%); border-color: rgba(241, 196, 15, 0.4); animation: pulsing-glow-1 6s ease-in-out infinite; }
  .rank-card.rank-1::before { animation: shimmer 6s linear infinite; animation-delay: 1s; }
  .rank-1 .rank-badge-text { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.7); }
  .rank-1 .player-name { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }

  .rank-card.rank-2 { border-left-color: #bdc3c7; background: linear-gradient(90deg, rgba(189, 195, 199, 0.1) 0%, rgba(0,0,0,0.7) 50%); border-color: rgba(189, 195, 199, 0.3); animation: pulsing-glow-2 6s ease-in-out infinite; }
  .rank-card.rank-2::before { background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.02) 20%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.02) 80%, rgba(255, 255, 255, 0) 100%); animation: shimmer 7s linear infinite; animation-delay: 2s; }
  .rank-2 .rank-badge-text { color: #bdc3c7; text-shadow: 0 0 10px rgba(189, 195, 199, 0.6); }

  .rank-card.rank-3 { border-left-color: #cd7f32; background: linear-gradient(90deg, rgba(205, 127, 50, 0.1) 0%, rgba(0,0,0,0.7) 50%); border-color: rgba(205, 127, 50, 0.2); animation: pulsing-glow-3 6s ease-in-out infinite; }
  .rank-card.rank-3::before { background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.01) 20%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.01) 80%, rgba(255, 255, 255, 0) 100%); animation: shimmer 8s linear infinite; animation-delay: 3s; }
  .rank-3 .rank-badge-text { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }

  .rank-card.rank-worst {
    border-left-color: transparent; border-left-image: linear-gradient(180deg, #ff4500, #ff0000, #ff4500); border-left-image-slice: 1;
    background: linear-gradient(90deg, rgba(128, 0, 0, 0.35) 0%, rgba(0,0,0,0.9) 100%); border-color: rgba(179, 0, 0, 0.4);
    box-shadow: 0 0 30px rgba(179, 0, 0, 0.7); animation: flameCard 4s ease-in-out infinite alternate, crackFlicker 5s ease-in-out infinite;
  }
  .rank-card.rank-worst .card-skull-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; fill: rgba(179, 0, 0, 0.1); filter: drop-shadow(0 0 10px #ff4500); z-index: 0; pointer-events: none; display: block; }
  .card-skull-bg { display: none; }
  .rank-worst .rank-badge-text { font-family: 'Nosifer', sans-serif; color: transparent; -webkit-text-stroke: 1.5px #800000; letter-spacing: 2px; filter: drop-shadow(0 0 10px #ff4500); animation: flameRank 4s ease-in-out infinite alternate; }
  .rank-worst .player-name { color: #ffffff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px #ff4500; animation: flameName 3s ease-in-out infinite alternate; }
  .rank-worst .games-played { color: #e74c3c; }
  .rank-worst .score-col { color: #ff4500 !important; text-shadow: 0 0 20px rgba(255, 69, 0, 0.8) !important; }

  @keyframes flameCard { 0% { box-shadow: 0 0 20px rgba(179, 0, 0, 0.5), inset 0 0 10px rgba(179, 0, 0, 0.2); } 100% { box-shadow: 0 0 25px rgba(179, 0, 0, 0.7), inset 0 0 15px rgba(179, 0, 0, 0.3); } }
  @keyframes flameRank { 0% { filter: drop-shadow(0 0 10px rgba(179, 0, 0, 0.6)); } 100% { filter: drop-shadow(0 0 15px rgba(179, 0, 0, 0.9)); } }
  @keyframes flameName { 0% { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 8px #ff4500; color: #ffffff; } 100% { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 12px #ff0000; color: #ffda79; } }
  @keyframes crackFlicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.95; } }
</style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="discreet-next-btn">DASHBOARD</a>
    
    <h1>KEYpro<span>poker</span></h1>
    <p class="subtitle">HALL OF FAME</p>

    <div class="board-title">ALL TIME RANKING</div>
    
    <div id="rankingBoard" class="ranking-list">
      <div class="empty-text">👑 過去の全データを集計中...</div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxijPOgmKGDL-UL5eAqOBKrxKVfPl4v6hsdLcWbiuwMrCWSPI5fqxu3qOmXIFTrMYCi5A/exec";
    function formatNumber(num) { return num.toLocaleString(); }
    function loadRanking() {
      const board = document.getElementById('rankingBoard');
      fetch(GAS_URL, { redirect: 'follow' })
        .then(response => {
          if (!response.ok) { throw new Error('ネットワークエラー'); }
          return response.json();
        })
        .then(players => {
          if (!players || players.length === 0) {
            board.innerHTML = '<div class="empty-text">まだ記録されたデータがありません</div>';
            return;
          }
          let html = '';
          players.forEach((player, index) => {
            let rankStr = (index + 1);
            let rankClass = "rank-other";
            if (index === 0) { rankClass = "rank-1"; }
            else if (index === 1) { rankClass = "rank-2"; }
            else if (index === 2) { rankClass = "rank-3"; }
            else if (index === players.length - 1 && players.length > 3) { rankClass = "rank-worst"; }
            let scoreClass = player.pay > 0 ? "score-plus" : (player.pay < 0 ? "score-minus" : "");
            let scoreSign = player.pay > 0 ? "+" : "";
            if (rankClass === "rank-worst") { scoreClass = ""; }
            let skullSvg = rankClass === 'rank-worst' ? `<svg class="card-skull-bg" viewBox="0 0 448 512"><path d="M439.2 236.1l-20.1-11.9c-6.4-3.8-14.6-1.6-18.4 5.1-18.9 34.6-56.3 58.7-99.1 58.7-42.8 0-80.1-24.1-99.1-58.7-3.8-6.7-12-8.9-18.4-5.1l-20.1 11.9c-6.7 4-8.9 12.6-5 19.3C181.8 290.4 200.7 320 224 320s42.2-29.6 66.8-64.7c3.9-6.7 1.7-15.3-5-19.3zm-111.2-120c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zm64 0c0-13.3-10.7-24-24-24s-24 10.7-24 24 10.7 24 24 24 24-10.7 24-24zM224 0C100.3 0 0 100.3 0 224v192c0 53 43 96 96 96h256c53 0 96-43 96-96V224C448 100.3 347.7 0 224 0zm96 416c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm-128 0c0 17.7-14.3 32-32 32s-32-14.3-32-32 14.3-32 32-32 32 14.3 32 32zm160-224C352 110.3 294.5 48 224 48s-128 62.3-128 144v14.1c0 23.6 15.1 44.8 36.9 52.8l10.8 4c16.3 6 30.1 16.6 39.4 30.2 11.2-16.1 27.6-29 46.9-36l10.8-4c21.8-8 36.9-29.2 36.9-52.8V192zm-32 96c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32zm-128 0c-17.7 0-32 14.3-32 32s14.3 32 32 32 32-14.3 32-32-14.3-32-32-32z"/></svg>` : '';
            html += `
              <div class="rank-card ${rankClass}">
                ${skullSvg}
                <div class="rank-col">
                  <div class="rank-badge-text">${rankStr}</div>
                </div>
                <div class="name-col">
                  <div class="player-name">${player.name}</div>
                  <div class="games-played">${player.games} GAMES PLAYED</div>
                </div>
                <div class="score-col ${scoreClass}">
                  <span class="num">${scoreSign}${formatNumber(player.pay)}</span>
                </div>
              </div>
            `;
          });
          board.innerHTML = html;
        })
        .catch(error => {
          board.innerHTML = '<div class="empty-text" style="color:#e74c3c;">データの読み込みに失敗しました。</div>';
        });
    }
    window.onload = loadRanking;
  </script>
</body>
</html>
