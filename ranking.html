<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランキング - KEYpro poker</title>
<style>
  body, button, table, th, td, h2, div, p { font-family: 'KEYpro', sans-serif; }
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; padding: 20px; text-align: center; margin: 0; min-height: 100vh; }
  .container { max-width: 800px; margin: 0 auto; background-color: rgba(0, 0, 0, 0.5); padding: 30px 20px; border-radius: 12px; border: 2px solid #d4af37; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
  h2 { color: #d4af37; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px; }
  p { color: #ecf0f1; margin-bottom: 20px; font-size: 14px; }
  
  .table-wrapper { width: 100%; margin-top: 20px; }
  
  table { margin: 0 auto; border-collapse: collapse; width: 100%; min-width: 500px; background-color: #ffffff; color: #000; border-radius: 8px; overflow: hidden; }
  th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
  th { background-color: #1a252f; color: #d4af37; white-space: nowrap; font-size: 14px; letter-spacing: 1px; }
  
  /* 順位ごとのカラー */
  .rank-1 { background-color: #f1c40f; font-weight: bold; font-size: 18px; }
  .rank-2 { background-color: #bdc3c7; font-weight: bold; font-size: 16px; }
  .rank-3 { background-color: #cd7f32; font-weight: bold; font-size: 16px; }
  
  /* プラスマイナスの色分け */
  .plus { color: #27ae60; font-weight: bold; font-size: 18px; }
  .minus { color: #c0392b; font-weight: bold; font-size: 18px; }
  
  .btn { background: transparent; color: white; border: 1px solid #ecf0f1; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 50px; margin-top: 30px; font-weight: bold; transition: all 0.3s; }
  .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
  #loading { font-size: 18px; color: #d4af37; margin: 30px 0; font-weight: bold; }

  /* 📱 スマホ画面のトランプ風デザイン */
  @media screen and (max-width: 600px) {
    body { padding: 10px; }
    .container { padding: 20px 10px; border-width: 1px; }
    
    table { display: block; min-width: 100%; border: none; background-color: transparent; }
    thead { display: none; }
    tbody { display: block; width: 100%; }
    
    tr { display: block; background-color: #ffffff; margin-bottom: 15px; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); border: 1px solid #ccc; }
    
    td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 16px; }
    td:last-child { border-bottom: none; }
    
    td::before { content: attr(data-label); font-weight: bold; color: #34495e; font-size: 13px; }
    
    /* スマホ時の順位の色付け調整 */
    .rank-1, .rank-2, .rank-3 { background-color: transparent; color: #000; }
    td.rank-1::after { content: "🥇"; margin-left: auto; }
    td.rank-2::after { content: "🥈"; margin-left: auto; }
    td.rank-3::after { content: "🥉"; margin-left: auto; }
    
    .btn { width: 100%; }
  }
</style>
</head>
<body>

  <div class="container">
    <h2>👑 ランキング</h2>
    <p>これまでのトータル成績</p>

    <div id="loading">⏳ データを読み込み中...</div>

    <div class="table-wrapper">
      <table id="rankingTable" style="display: none;">
        <thead>
          <tr>
            <th>順位</th>
            <th>プレイヤー名</th>
            <th>参加回数</th>
            <th>トータルPay (円)</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>

    <button class="btn" onclick="location.href='index.html'">◀ トップに戻る</button>
  </div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxijPOgmKGDL-UL5eAqOBKrxKVfPl4v6hsdLcWbiuwMrCWSPI5fqxu3qOmXIFTrMYCi5A/exec";

  window.onload = () => {
    fetch(GAS_URL)
      .then(response => response.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        
        if (data.length === 0) {
          document.getElementById('loading').innerText = "まだ記録がありません。";
          document.getElementById('loading').style.display = 'block';
          return;
        }

        const table = document.getElementById('rankingTable');
        const tbody = document.getElementById('tableBody');
        table.style.display = 'table';

        data.forEach((player, index) => {
          const tr = document.createElement('tr');
          
          let rankText = (index + 1) + "位";
          let rankClass = "";
          if (index === 0) { rankText = "1位"; rankClass = "rank-1"; }
          if (index === 1) { rankText = "2位"; rankClass = "rank-2"; }
          if (index === 2) { rankText = "3位"; rankClass = "rank-3"; }

          let payClass = player.pay > 0 ? "plus" : (player.pay < 0 ? "minus" : "");
          let payText = player.pay > 0 ? "+" + player.pay : player.pay;

          // スマホ表示用に data-label を追加
          tr.innerHTML = `
            <td data-label="🏆 順位" class="${rankClass}">${rankText}</td>
            <td data-label="👤 名前">${player.name}</td>
            <td data-label="🎰 参加回数">${player.games} 回</td>
            <td data-label="💴 トータル" class="${payClass}">${payText}</td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(error => {
        document.getElementById('loading').innerText = "データの読み込みに失敗しました。";
        document.getElementById('loading').style.color = "#e74c3c";
      });
  };
</script>
</body>
</html>
