<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HALL OF FAME - KEYpro poker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@900&display=swap" rel="stylesheet">
<style>
  /* 全体の設定 */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { max-width: 100vw; overflow-x: hidden; }

  body, button, h1, p, div { font-family: 'KEYpro', sans-serif; }
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  
  .container { display: flex; flex-direction: column; width: 100%; max-width: 900px; height: 85vh; min-height: 650px; background-color: rgba(0, 0, 0, 0.8); border-radius: 16px; border: 2px solid #d4af37; box-shadow: 0 15px 50px rgba(0,0,0,0.9); overflow: hidden; padding: 40px; position: relative; }

  /* ロゴフォント */
  h1 { font-family: 'Work Sans', sans-serif; color: #d4af37; font-size: 50px; margin: 0 0 5px 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); letter-spacing: -3px; font-weight: 900; }
  h1 span { font-family: 'KEYpro', sans-serif; color: #d4af37; font-size: 14px; margin-left: 10px; font-weight: normal; text-transform: uppercase; letter-spacing: 4px; vertical-align: middle; }

  p.subtitle { font-size: 14px; margin-bottom: 30px; color: #7f8fa6; letter-spacing: 3px; text-transform: uppercase; }

  /* 共通タイトルデザイン */
  .board-title { color: #d4af37; font-size: 20px; letter-spacing: 4px; font-weight: bold; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.4); padding-bottom: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); margin-bottom: 20px; flex-shrink: 0; }
  .board-title::before { content: ''; display: inline-block; width: 6px; height: 20px; background-color: #d4af37; box-shadow: 0 0 10px #d4af37; }

  /* 🏆 ランキングリスト */
  .ranking-list { display: flex; flex-direction: column; gap: 15px; width: 100%; flex-grow: 1; overflow-y: auto; padding-right: 15px; margin-bottom: 20px; }
  .ranking-list::-webkit-scrollbar { width: 4px; }
  .ranking-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .ranking-list::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }

  /* カードデザイン（VIPゴールド仕様） */
  .rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.7); border: 1px solid #333; padding: 15px 25px; border-radius: 8px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); flex-shrink: 0; transition: all 0.3s; border-left: 5px solid #7f8fa6; position: relative; overflow: hidden; }
  .rank-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100%); opacity: 0.7; pointer-events: none; }
  
  /* 順位表示（円なし、光る数字のみ） */
  .rank-col { display: flex; align-items: center; justify-content: center; width: 40px; margin-right: 15px; z-index: 1; }
  .rank-badge-text { font-family: 'Courier New', monospace; font-size: 42px; font-weight: bold; color: #7f8fa6; letter-spacing: 2px; }

  /* 名前・参加回数表示 */
  .name-col { flex-grow: 1; text-align: left; padding-left: 10px; display: flex; flex-direction: column; gap: 2px; justify-content: center; z-index: 1; }
  .player-name { font-size: 22px; font-weight: bold; color: #f1f2f6; letter-spacing: 2px; text-transform: uppercase; text-shadow: 1px 1px 2px #000; }
  
  /* GASから取得した「参加回数（games）」の表示スタイル */
  .games-played { font-size: 12px; color: #7f8fa6; letter-spacing: 1px; font-family: 'Courier New', monospace; font-weight: bold; }
  .rank-1 .games-played { color: rgba(241, 196, 15, 0.8); }

  /* スコア（Pay）表示 - 単位なし */
  .score-col { font-weight: bold; font-size: 38px; text-align: right; font-family: 'Courier New', monospace; letter-spacing: 1px; line-height: 1; z-index: 1; }

  .score-plus { color: #2ed573; text-shadow: 0 0 15px rgba(46, 213, 115, 0.4); }
  .score-minus { color: #ff4757; text-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }

  .empty-text { color: #d4af37; font-size: 18px; width: 100%; text-align: center; margin-top: 40px; letter-spacing: 2px; line-height: 2; font-weight: bold; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }

  /* 戻るボタン */
  .btn-back { display: block; width: 100%; max-width: 300px; margin: 0 auto; padding: 18px; background: transparent; color: #d4af37; font-size: 16px; font-weight: bold; text-align: center; text-decoration: none; border: 1px solid rgba(212, 175, 55, 0.5); border-radius: 50px; transition: all 0.3s; letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }
  .btn-back:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

  /* 📱 スマホ用 */
  @media screen and (max-width: 600px) {
    body { padding: 10px; display: block; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .container { padding: 25px 15px; height: auto; min-height: auto; border-radius: 8px; border-width: 1px; }
    
    h1 { font-size: 36px; letter-spacing: -2px; }
    h1 span { font-size: 12px; }
    
    .board-title { font-size: 18px; margin-right: -4px; }
    
    .ranking-list { padding-right: 0; gap: 12px; }
    .rank-card { padding: 12px 15px; border-left-width: 4px; border-radius: 6px; }
    
    .rank-col { width: 30px; margin-right: 10px; }
    .rank-badge-text { font-size: 28px; }
    
    .name-col { padding-left: 5px; }
    .player-name { font-size: 16px; }
    .games-played { font-size: 10px; }
    
    .score-col { font-size: 24px; }
    
    .btn-back { padding: 15px; font-size: 14px; margin-top: 15px; }
  }

  /* ★★★ ここから下にキラキラとさりげない効果を追加 ★★★ */

  /* アニメーションの定義 */
  /* 1. Shimmer（光の通り抜け） */
  @keyframes shimmer {
    0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; }
    30% { opacity: 0.6; } /* 光が当たる瞬間 */
    50% { opacity: 0; } /* 通り抜けた後 */
    100% { transform: translateX(150%) skewX(-20deg); opacity: 0; }
  }

  /* 2. Pulsing Glow（光彩のパルス） - 1位 ゴールド */
  @keyframes pulsing-glow-1 {
    0% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.15), inset 0 0 5px rgba(241, 196, 15, 0.05); }
    50% { box-shadow: 0 0 30px rgba(241, 196, 15, 0.5), inset 0 0 10px rgba(241, 196, 15, 0.2); }
    100% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.15), inset 0 0 5px rgba(241, 196, 15, 0.05); }
  }

  /* 2. Pulsing Glow（光彩のパルス） - 2位 シルバー */
  @keyframes pulsing-glow-2 {
    0% { box-shadow: 0 0 10px rgba(189, 195, 199, 0.1); }
    50% { box-shadow: 0 0 20px rgba(189, 195, 199, 0.4); }
    100% { box-shadow: 0 0 10px rgba(189, 195, 199, 0.1); }
  }

  /* 2. Pulsing Glow（光彩のパルス） - 3位 ブロンズ */
  @keyframes pulsing-glow-3 {
    0% { box-shadow: 0 0 8px rgba(205, 127, 50, 0.08); }
    50% { box-shadow: 0 0 18px rgba(205, 127, 50, 0.3); }
    100% { box-shadow: 0 0 8px rgba(205, 127, 50, 0.08); }
  }

  /* ★共通のキラキラ Shimmer スタイル★ */
  .rank-card.rank-1::before,
  .rank-card.rank-2::before,
  .rank-card.rank-3::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to right,
      rgba(255, 255, 255, 0) 0%,
      rgba(255, 255, 255, 0.05) 20%,
      rgba(255, 255, 255, 0.3) 50%,
      rgba(255, 255, 255, 0.05) 80%,
      rgba(255, 255, 255, 0) 100%
    );
    z-index: 2;
    pointer-events: none;
    opacity: 0;
  }

  /* ★1位 ゴールドカードへの効果★ */
  .rank-card.rank-1 {
    border-left-color: #f1c40f;
    background: linear-gradient(90deg, rgba(241, 196, 15, 0.15) 0%, rgba(0,0,0,0.7) 50%);
    border-color: rgba(241, 196, 15, 0.4);
    animation: pulsing-glow-1 4s ease-in-out infinite;
  }

  .rank-card.rank-1::before {
    animation: shimmer 5s linear infinite;
    animation-delay: 1s;
  }

  .rank-1 .rank-badge-text {
    color: #f1c40f;
    text-shadow: 0 0 15px rgba(241, 196, 15, 0.7);
  }
  
  .rank-1 .player-name {
    font-size: 26px;
    color: #f1c40f;
    text-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
  }

  @media screen and (max-width: 600px) {
    .rank-1 .player-name { font-size: 18px; }
  }

  /* ★2位 シルバーカードへの効果★ */
  .rank-card.rank-2 {
    border-left-color: #bdc3c7;
    background: linear-gradient(90deg, rgba(189, 195, 199, 0.1) 0%, rgba(0,0,0,0.7) 50%);
    border-color: rgba(189, 195, 199, 0.3);
    animation: pulsing-glow-2 4s ease-in-out infinite;
  }
  
  .rank-card.rank-2::before {
    background: linear-gradient(
      to right,
      rgba(255, 255, 255, 0) 0%,
      rgba(255, 255, 255, 0.02) 20%,
      rgba(255, 255, 255, 0.2) 50%,
      rgba(255, 255, 255, 0.02) 80%,
      rgba(255, 255, 255, 0) 100%
    );
    animation: shimmer 6s linear infinite;
    animation-delay: 2s;
  }

  .rank-2 .rank-badge-text {
    color: #bdc3c7;
    text-shadow: 0 0 10px rgba(189, 195, 199, 0.6);
  }

  /* ★3位 ブロンズカードへの効果★ */
  .rank-card.rank-3 {
    border-left-color: #cd7f32;
    background: linear-gradient(90deg, rgba(205, 127, 50, 0.1) 0%, rgba(0,0,0,0.7) 50%);
    border-color: rgba(205, 127, 50, 0.2);
    animation: pulsing-glow-3 4s ease-in-out infinite;
  }
  
  .rank-card.rank-3::before {
    background: linear-gradient(
      to right,
      rgba(255, 255, 255, 0) 0%,
      rgba(255, 255, 255, 0.01) 20%,
      rgba(255, 255, 255, 0.15) 50%,
      rgba(255, 255, 255, 0.01) 80%,
      rgba(255, 255, 255, 0) 100%
    );
    animation: shimmer 7s linear infinite;
    animation-delay: 3s;
  }

  .rank-3 .rank-badge-text {
    color: #cd7f32;
    text-shadow: 0 0 10px rgba(205, 127, 50, 0.5);
  }
</style>
</head>
<body>

  <div class="container">
    <h1>KEYpro<span>poker</span></h1>
    <p class="subtitle">HALL OF FAME</p>

    <div class="board-title">ALL TIME RANKING</div>
    
    <div id="rankingBoard" class="ranking-list">
      <div class="empty-text">👑 過去の全データを集計中...</div>
    </div>

    <a href="index.html" class="btn-back">◀ ダッシュボードに戻る</a>
  </div>

  <script>
    // ★ 指定いただいたご自身のGASの「ウェブアプリのURL」
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxijPOgmKGDL-UL5eAqOBKrxKVfPl4v6hsdLcWbiuwMrCWSPI5fqxu3qOmXIFTrMYCi5A/exec";

    function formatNumber(num) {
      return num.toLocaleString();
    }

    function loadRanking() {
      const board = document.getElementById('rankingBoard');

      // 通信をより強固にする設定
      fetch(GAS_URL, { redirect: 'follow' })
        .then(response => {
          if (!response.ok) { throw new Error('ネットワークエラー'); }
          return response.json();
        })
        .then(players => {
          if (!players || players.length === 0) {
            board.innerHTML = '<div class="empty-text">まだ記録されたデータがありません</div>';
            return;
          }

          let html = '';
          players.forEach((player, index) => {
            let rankStr = (index + 1);
            let rankClass = "rank-other";
            
            if (index === 0) { rankClass = "rank-1"; }
            else if (index === 1) { rankClass = "rank-2"; }
            else if (index === 2) { rankClass = "rank-3"; }

            // GASから渡される player.pay を使用してプラスマイナスを判定
            let scoreClass = player.pay > 0 ? "score-plus" : (player.pay < 0 ? "score-minus" : "");
            let scoreSign = player.pay > 0 ? "+" : "";

            html += `
              <div class="rank-card ${rankClass}">
                <div class="rank-col">
                  <div class="rank-badge-text">${rankStr}</div>
                </div>
                <div class="name-col">
                  <div class="player-name">${player.name}</div>
                  <div class="games-played">${player.games} GAMES PLAYED</div>
                </div>
                <div class="score-col ${scoreClass}">
                  <span class="num">${scoreSign}${formatNumber(player.pay)}</span>
                </div>
              </div>
            `;
          });
          board.innerHTML = html;
        })
        .catch(error => {
          console.error("エラー:", error);
          board.innerHTML = '<div class="empty-text" style="color:#e74c3c; font-size:14px; line-height:1.5;">データの読み込みに失敗しました。<br>GASのデプロイ設定「アクセスできるユーザー」が<br>「全員」になっているか確認してください。</div>';
        });
    }

    // 画面が読み込まれたら自動でランキングを取得開始
    window.onload = loadRanking;
  </script>
</body>
</html>
